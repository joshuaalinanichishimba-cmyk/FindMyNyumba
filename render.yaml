databases:
  - name: findmynyumba_db
    databaseName: findmynyumba_db
    user: findmynyumba_user
    plan: free

services:
  - type: web
    name: FindMyNyumba
    env: python
    plan: free
    buildCommand: |
      cd backend
      pip install -r requirements.txt
    startCommand: |
      cd backend
      python scripts/init_and_restore.py
      uvicorn app.main:app --host 0.0.0.0 --port 10000
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: findmynyumba_db
          property: connectionString
      - key: SECRET_KEY
        scope: run
      - key: FRONTEND_URL
        scope: run
      - key: CLOUDINARY_CLOUD_NAME
        scope: run
      - key: CLOUDINARY_API_KEY
        scope: run
      - key: CLOUDINARY_API_SECRET
        scope: run
    depends_on:
      - findmynyumba_db
