<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FindMyNyumba — Admin Password Reset</title>
    <link rel="icon" type="image/png" href="logo.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --bg:        #0a0c10;
            --panel:     #111318;
            --border:    rgba(255,255,255,0.07);
            --border-hi: rgba(234,88,12,0.5);
            --text:      #f0f2f5;
            --muted:     #6b7280;
            --accent:    #ea580c;
            --accent-hi: #fb923c;
            --danger:    #ef4444;
            --success:   #22c55e;
            --input-bg:  #1a1d24;
        }

        body {
            font-family: 'DM Sans', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem 1rem;
            overflow: hidden;
            position: relative;
        }

        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background:
                radial-gradient(ellipse 60% 50% at 10% 20%, rgba(234,88,12,0.08) 0%, transparent 60%),
                radial-gradient(ellipse 40% 40% at 90% 80%, rgba(234,88,12,0.05) 0%, transparent 60%);
            pointer-events: none;
        }

        body::after {
            content: '';
            position: fixed;
            inset: 0;
            background-image:
                linear-gradient(rgba(255,255,255,0.02) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255,255,255,0.02) 1px, transparent 1px);
            background-size: 48px 48px;
            pointer-events: none;
        }

        .container {
            width: 100%;
            max-width: 400px;
            position: relative;
            z-index: 1;
            animation: fadeUp 0.5s ease both;
        }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(20px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .header { text-align: center; margin-bottom: 2rem; }

        .logo-wrap {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 1.25rem;
            text-decoration: none;
        }

        .logo-wrap img {
            height: 48px;
            width: auto;
            object-fit: contain;
            filter: brightness(1.2);
        }

        .logo-fallback {
            font-size: 1.5rem;
            font-weight: 800;
            color: var(--accent);
            letter-spacing: -0.5px;
            display: none;
        }

        .header h1 {
            font-size: 1.5rem;
            font-weight: 700;
            letter-spacing: -0.3px;
            color: var(--text);
            margin-bottom: 0.4rem;
        }

        .header p {
            font-size: 0.82rem;
            color: var(--muted);
            line-height: 1.5;
        }

        .card {
            background: var(--panel);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 2rem;
            box-shadow: 0 0 0 1px rgba(0,0,0,0.5), 0 24px 48px rgba(0,0,0,0.4);
        }

        .alert {
            display: none;
            align-items: flex-start;
            gap: 10px;
            padding: 11px 14px;
            border-radius: 10px;
            font-size: 0.82rem;
            font-weight: 500;
            line-height: 1.4;
            margin-bottom: 1.25rem;
            animation: slideDown 0.2s ease;
        }

        @keyframes slideDown {
            from { opacity: 0; transform: translateY(-6px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .alert.error   { background: rgba(239,68,68,0.1);  border: 1px solid rgba(239,68,68,0.2);  color: #fca5a5; display: flex; }
        .alert.success { background: rgba(34,197,94,0.1);  border: 1px solid rgba(34,197,94,0.2);  color: #86efac; display: flex; }
        .alert svg { flex-shrink: 0; margin-top: 1px; }

        .field { margin-bottom: 1rem; }

        .field label {
            display: block;
            font-size: 0.7rem;
            font-weight: 600;
            font-family: 'DM Mono', monospace;
            letter-spacing: 0.09em;
            text-transform: uppercase;
            color: var(--muted);
            margin-bottom: 6px;
        }

        .input-wrap { position: relative; }

        .input-icon {
            position: absolute;
            left: 13px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--muted);
            pointer-events: none;
            transition: color 0.2s;
        }

        .field input {
            width: 100%;
            padding: 11px 14px 11px 40px;
            background: var(--input-bg);
            border: 1px solid var(--border);
            border-radius: 10px;
            color: var(--text);
            font-family: 'DM Sans', sans-serif;
            font-size: 0.9rem;
            outline: none;
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        .field input:focus {
            border-color: var(--border-hi);
            box-shadow: 0 0 0 3px rgba(234,88,12,0.12);
        }

        .field input:focus ~ .input-icon { color: var(--accent); }
        .field input::placeholder { color: #2d3340; }

        .btn-submit {
            width: 100%;
            padding: 12px;
            background: var(--accent);
            color: white;
            font-family: 'DM Sans', sans-serif;
            font-size: 0.9rem;
            font-weight: 700;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: background 0.2s, opacity 0.2s;
            margin-top: 1.25rem;
        }
        .btn-submit:hover:not(:disabled) { background: var(--accent-hi); }
        .btn-submit:disabled { opacity: 0.55; cursor: not-allowed; }

        .spinner {
            display: none;
            width: 15px; height: 15px;
            border: 2px solid rgba(255,255,255,0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* Dev-only token box */
        .token-box {
            display: none;
            margin-top: 1.25rem;
            padding: 12px 14px;
            background: rgba(234,88,12,0.06);
            border: 1px dashed rgba(234,88,12,0.3);
            border-radius: 10px;
        }
        .token-box p {
            font-size: 0.7rem;
            font-family: 'DM Mono', monospace;
            color: var(--muted);
            margin-bottom: 6px;
            text-transform: uppercase;
            letter-spacing: 0.06em;
        }
        .token-box code {
            display: block;
            font-size: 0.72rem;
            font-family: 'DM Mono', monospace;
            color: var(--accent-hi);
            word-break: break-all;
            line-height: 1.5;
        }
        .token-box a {
            display: inline-block;
            margin-top: 8px;
            font-size: 0.78rem;
            font-weight: 600;
            color: var(--accent);
            text-decoration: none;
        }
        .token-box a:hover { color: var(--accent-hi); }

        .divider { height: 1px; background: var(--border); margin: 1.25rem 0; }

        .security-note {
            display: flex;
            align-items: center;
            gap: 9px;
            font-size: 0.75rem;
            color: var(--muted);
            padding: 10px 12px;
            background: rgba(255,255,255,0.02);
            border: 1px solid var(--border);
            border-radius: 8px;
        }
        .security-note svg { flex-shrink: 0; color: var(--accent); opacity: 0.6; }

        .back-link {
            display: block;
            text-align: center;
            margin-top: 1.25rem;
            font-size: 0.8rem;
            color: var(--muted);
            text-decoration: none;
            transition: color 0.2s;
        }
        .back-link:hover { color: var(--text); }

        .footnote {
            text-align: center;
            margin-top: 1.5rem;
            font-size: 0.68rem;
            color: #2d3340;
            font-family: 'DM Mono', monospace;
            letter-spacing: 0.04em;
        }
    </style>
</head>
<body>

<div class="container">

    <div class="header">
        <a href="admin-login.html" class="logo-wrap">
            <img src="logo.png" alt="FindMyNyumba"
                 onerror="this.style.display='none'; document.getElementById('logo-fallback').style.display='block'">
            <span id="logo-fallback" class="logo-fallback">FindMyNyumba</span>
        </a>
        <h1>Reset Admin Password</h1>
        <p>Enter your admin email and we'll generate a reset link.</p>
    </div>

    <div class="card">

        <div id="alert" class="alert" role="alert" aria-live="polite">
            <svg id="alert-icon" width="15" height="15" viewBox="0 0 20 20" fill="currentColor">
                <path fill-rule="evenodd" d="M18 10a8 8 0 11-16 0 8 8 0 0116 0zm-7 4a1 1 0 11-2 0 1 1 0 012 0zm-1-9a1 1 0 00-1 1v4a1 1 0 102 0V6a1 1 0 00-1-1z" clip-rule="evenodd"/>
            </svg>
            <span id="alert-text"></span>
        </div>

        <form id="forgot-form" novalidate>
            <div class="field">
                <label for="admin-email">Admin Email</label>
                <div class="input-wrap">
                    <input id="admin-email" type="email" placeholder="admin@findmynyumba.zm"
                           autocomplete="email" required>
                    <svg class="input-icon" width="15" height="15" viewBox="0 0 20 20" fill="currentColor">
                        <path d="M2.003 5.884L10 9.882l7.997-3.998A2 2 0 0016 4H4a2 2 0 00-1.997 1.884z"/>
                        <path d="M18 8.118l-8 4-8-4V14a2 2 0 002 2h12a2 2 0 002-2V8.118z"/>
                    </svg>
                </div>
            </div>

            <button type="submit" class="btn-submit" id="submit-btn">
                <span id="btn-text">Send Reset Link</span>
                <div class="spinner" id="spinner"></div>
            </button>
        </form>

        <div class="token-box" id="token-box">
            <p>⚠ Dev mode — reset token (remove in production)</p>
            <code id="token-value"></code>
            <a id="reset-link" href="#">→ Go to reset page</a>
        </div>

        <div class="divider"></div>

        <div class="security-note">
            <svg width="14" height="14" viewBox="0 0 20 20" fill="currentColor">
                <path fill-rule="evenodd" d="M2.166 4.999A11.954 11.954 0 0010 1.944 11.954 11.954 0 0017.834 5c.11.65.166 1.32.166 2.001 0 5.225-3.34 9.67-8 11.317C5.34 16.67 2 12.225 2 7c0-.682.057-1.35.166-2.001zm11.541 3.708a1 1 0 00-1.414-1.414L9 10.586 7.707 9.293a1 1 0 00-1.414 1.414l2 2a1 1 0 001.414 0l4-4z" clip-rule="evenodd"/>
            </svg>
            Reset links expire after 30 minutes
        </div>

    </div>

    <a href="admin-login.html" class="back-link">← Back to Admin Login</a>
    <p class="footnote">FindMyNyumba © 2026 · Admin access is logged and monitored</p>

</div>

<script>
'use strict';
const API = 'https://findmynyumba.onrender.com/api/v1';

function showAlert(msg, type = 'error') {
    const ICONS = {
        error:   `<path fill-rule="evenodd" d="M18 10a8 8 0 11-16 0 8 8 0 0116 0zm-7 4a1 1 0 11-2 0 1 1 0 012 0zm-1-9a1 1 0 00-1 1v4a1 1 0 102 0V6a1 1 0 00-1-1z" clip-rule="evenodd"/>`,
        success: `<path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zm3.707-9.293a1 1 0 00-1.414-1.414L9 10.586 7.707 9.293a1 1 0 00-1.414 1.414l2 2a1 1 0 001.414 0l4-4z" clip-rule="evenodd"/>`,
    };
    const el = document.getElementById('alert');
    el.className = `alert ${type}`;
    document.getElementById('alert-icon').innerHTML = ICONS[type] || ICONS.error;
    document.getElementById('alert-text').textContent = msg;
}

document.getElementById('forgot-form').addEventListener('submit', async e => {
    e.preventDefault();

    const email   = document.getElementById('admin-email').value.trim();
    const btn     = document.getElementById('submit-btn');
    const btnText = document.getElementById('btn-text');
    const spinner = document.getElementById('spinner');

    if (!email) {
        showAlert('Please enter your admin email address.', 'error');
        return;
    }

    btn.disabled          = true;
    btnText.textContent   = 'Sending…';
    spinner.style.display = 'block';

    try {
        const res  = await fetch(`${API}/admin/forgot-password`, {
            method:  'POST',
            headers: { 'Content-Type': 'application/json' },
            body:    JSON.stringify({ email }),
        });
        const data = await res.json();

        if (!res.ok) throw new Error(data.detail || 'Request failed.');

        showAlert(data.message || 'If that admin email exists, a reset link has been sent.', 'success');

        // DEV ONLY: surface the token so local testing is easy
        if (data.reset_token) {
            const tokenBox  = document.getElementById('token-box');
            const tokenVal  = document.getElementById('token-value');
            const resetLink = document.getElementById('reset-link');

            tokenVal.textContent = data.reset_token;
            resetLink.href = `admin-reset-password.html?token=${encodeURIComponent(data.reset_token)}`;
            tokenBox.style.display = 'block';
        }

    } catch (err) {
        showAlert(err.message, 'error');
    } finally {
        btn.disabled          = false;
        btnText.textContent   = 'Send Reset Link';
        spinner.style.display = 'none';
    }
});
</script>

</body>
</html>
