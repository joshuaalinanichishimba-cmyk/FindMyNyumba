<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register as Landlord - FindMyNyumba</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="icon" type="image/png" href="logo.png">
</head>
<body class="bg-slate-50 flex flex-col items-center justify-center min-h-screen py-10">
    <div class="text-center mb-6 flex flex-col items-center">
        <a href="browse.html" class="mb-2 w-64 md:w-80 h-20 md:h-24 overflow-hidden flex justify-center items-center relative transition-transform duration-300 hover:scale-105">
            <img src="logo.png" alt="FindMyNyumba Logo" class="absolute w-full h-full object-contain transform scale-[2.4] md:scale-[2.8] mix-blend-multiply brightness-[1.3] contrast-[1.5] saturate-125" onerror="this.style.display='none'">
        </a>
        <h1 class="text-4xl font-black text-slate-900">Landlord Registration</h1>
        <div class="mt-2 text-slate-500 flex flex-col items-center space-y-1">
            <span>Already have an account? <a href="login.html" class="text-[#ea580c] font-bold hover:underline">Sign in here</a></span>
            <span>Are you a student? <a href="register.html" class="text-slate-800 font-bold hover:underline border-b-2 border-slate-800">Register as a Student</a></span>
        </div>
    </div>

    <div class="w-full max-w-xl bg-white rounded-xl shadow-md border border-slate-200 p-8 mb-10">
        
        <div id="error-message" class="hidden mb-6 p-3 bg-red-50 text-red-600 text-sm font-bold rounded-lg border border-red-100 flex items-start">
            <i class="fas fa-exclamation-circle mt-1 mr-2 flex-shrink-0"></i>
            <span id="error-text"></span>
        </div>

        <div id="success-message" class="hidden mb-6 p-4 bg-green-50 text-green-700 text-sm font-bold rounded-lg border border-green-200 flex flex-col items-center text-center">
            <i class="fas fa-check-circle text-3xl mb-2"></i>
            <span>Registration successful! Redirecting to login...</span>
        </div>

        <form id="landlordForm" class="space-y-5">
            
            <div class="grid grid-cols-1 md:grid-cols-2 gap-5">
                <div>
                    <label class="block text-xs font-bold text-gray-500 uppercase mb-1">Full Name</label>
                    <input type="text" id="fullName" required class="w-full px-4 py-3 rounded-lg border border-slate-300 focus:outline-none focus:ring-2 focus:ring-[#ea580c] transition-shadow">
                </div>
                <div>
                    <label class="block text-xs font-bold text-gray-500 uppercase mb-1">Email Address</label>
                    <input type="email" id="email" required class="w-full px-4 py-3 rounded-lg border border-slate-300 focus:outline-none focus:ring-2 focus:ring-[#ea580c] transition-shadow">
                </div>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-5">
                <div>
                    <label class="block text-xs font-bold text-gray-500 uppercase mb-1">Phone Number</label>
                    <input type="tel" id="phone" required class="w-full px-4 py-3 rounded-lg border border-slate-300 focus:outline-none focus:ring-2 focus:ring-[#ea580c] transition-shadow">
                </div>
                <div>
                    <label class="block text-xs font-bold text-gray-500 uppercase mb-1">Business Name (Optional)</label>
                    <input type="text" id="businessName" class="w-full px-4 py-3 rounded-lg border border-slate-300 focus:outline-none focus:ring-2 focus:ring-[#ea580c] transition-shadow">
                </div>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-5">
                <div>
                    <label class="block text-xs font-bold text-gray-500 uppercase mb-1">Primary Location</label>
                    <input type="text" id="location" required class="w-full px-4 py-3 rounded-lg border border-slate-300 focus:outline-none focus:ring-2 focus:ring-[#ea580c] transition-shadow">
                </div>
                <div>
                    <label class="block text-xs font-bold text-gray-500 uppercase mb-1">National ID / Passport Number</label>
                    <input type="text" id="idNumber" required class="w-full px-4 py-3 rounded-lg border border-slate-300 focus:outline-none focus:ring-2 focus:ring-[#ea580c] transition-shadow">
                </div>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-5 pt-2">
                <div>
                    <label class="block text-xs font-bold text-gray-500 uppercase mb-1">Password</label>
                    <input type="password" id="password" required class="w-full px-4 py-3 rounded-lg border border-slate-300 focus:outline-none focus:ring-2 focus:ring-[#ea580c] transition-shadow">
                    <div class="mt-2 hidden" id="pwd-strength-container">
                        <div class="flex justify-between mb-1">
                            <span class="text-xs font-bold text-slate-500">Strength</span>
                            <span class="text-xs font-bold" id="pwd-strength-text">Weak</span>
                        </div>
                        <div class="w-full bg-slate-200 rounded-full h-1.5 flex gap-1">
                            <div class="h-1.5 w-1/3 rounded-full transition-all duration-300" id="pwd-bar-1"></div>
                            <div class="h-1.5 w-1/3 rounded-full transition-all duration-300" id="pwd-bar-2"></div>
                            <div class="h-1.5 w-1/3 rounded-full transition-all duration-300" id="pwd-bar-3"></div>
                        </div>
                    </div>
                </div>
                <div>
                    <label class="block text-xs font-bold text-gray-500 uppercase mb-1">Confirm Password</label>
                    <input type="password" id="confirmPassword" required class="w-full px-4 py-3 rounded-lg border border-slate-300 focus:outline-none focus:ring-2 focus:ring-[#ea580c] transition-shadow">
                </div>
            </div>
            <p class="text-[10px] text-slate-500 mt-1">Must be 8-12 chars, 1 uppercase, 1 lowercase, 1 number, 1 special character.</p>

            <label class="flex items-center text-sm text-slate-600 cursor-pointer pt-2">
                <input type="checkbox" id="terms" required class="mr-2 rounded border-slate-300 text-[#ea580c] focus:ring-[#ea580c]">
                I agree to the <a href="#" class="text-[#ea580c] hover:underline ml-1">Terms and Conditions</a> and <a href="#" class="text-[#ea580c] hover:underline ml-1">Privacy Policy</a>
            </label>

            <button type="submit" id="submitBtn" class="w-full bg-slate-900 text-white font-bold py-4 rounded-lg hover:bg-black transition duration-200 flex justify-center items-center shadow-lg">
                <span id="btn-text">Create Landlord Account</span>
                <svg id="btn-spinner" class="hidden animate-spin ml-2 h-5 w-5 text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg>
            </button>
        </form>
    </div>

    <script>
        const API_BASE_URL = 'https://findmynyumba.onrender.com/api/v1';

        function showError(msg) {
            document.getElementById('error-text').innerText = msg;
            document.getElementById('error-message').classList.remove('hidden');
        }
        function hideError() { document.getElementById('error-message').classList.add('hidden'); }

        // Password Strength Logic
        document.getElementById('password').addEventListener('input', (e) => {
            const val = e.target.value;
            const container = document.getElementById('pwd-strength-container');
            if (val.length > 0) container.classList.remove('hidden');
            else container.classList.add('hidden');

            let strength = 0;
            if (val.length >= 8 && val.length <= 12) strength++;
            if (/[A-Z]/.test(val) && /[a-z]/.test(val)) strength++;
            if (/[0-9]/.test(val) && /[^A-Za-z0-9]/.test(val)) strength++;

            const text = document.getElementById('pwd-strength-text');
            const b1 = document.getElementById('pwd-bar-1');
            const b2 = document.getElementById('pwd-bar-2');
            const b3 = document.getElementById('pwd-bar-3');

            b1.className = b2.className = b3.className = 'h-1.5 w-1/3 rounded-full transition-all duration-300 bg-slate-200';

            if (strength === 1) { 
                text.innerText = 'Weak'; text.className = 'text-xs font-bold text-red-500'; 
                b1.classList.replace('bg-slate-200', 'bg-red-500'); 
            } else if (strength === 2) { 
                text.innerText = 'Medium'; text.className = 'text-xs font-bold text-yellow-500'; 
                b1.classList.replace('bg-slate-200', 'bg-yellow-500'); b2.classList.replace('bg-slate-200', 'bg-yellow-500'); 
            } else if (strength >= 3) { 
                text.innerText = 'Strong'; text.className = 'text-xs font-bold text-green-500'; 
                b1.classList.replace('bg-slate-200', 'bg-green-500'); b2.classList.replace('bg-slate-200', 'bg-green-500'); b3.classList.replace('bg-slate-200', 'bg-green-500'); 
            }
        });

        document.getElementById('landlordForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            hideError();
            
            const password = document.getElementById('password').value;
            const confirm = document.getElementById('confirmPassword').value;
            
            if (password !== confirm) return showError("Passwords do not match.");
            
            const pwdRegex = /^(?=.*[a-z])(?=.*[A-Z])(?=.*\d)(?=.*[^A-Za-z0-9])[A-Za-z\d\D]{8,12}$/;
            if (!pwdRegex.test(password)) {
                return showError("Password must be 8-12 characters and include an uppercase letter, lowercase letter, number, and special character.");
            }

            const btn = document.getElementById('submitBtn');
            btn.disabled = true;
            document.getElementById('btn-text').innerText = 'Creating Account...';
            document.getElementById('btn-spinner').classList.remove('hidden');

            const payload = {
                full_name: document.getElementById('fullName').value.trim(),
                email: document.getElementById('email').value.trim(),
                phone_number: document.getElementById('phone').value.trim(),
                password: password,
                role: 'landlord',
                // Optional backend payload mapping
                business_name: document.getElementById('businessName').value.trim(),
                location: document.getElementById('location').value.trim(),
                id_number: document.getElementById('idNumber').value.trim()
            };

            try {
                const res = await fetch(`${API_BASE_URL}/auth/register`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                
                const data = await res.json();
                if (!res.ok) throw new Error(data.detail || 'Registration failed.');

                document.getElementById('landlordForm').classList.add('hidden');
                document.getElementById('success-message').classList.remove('hidden');
                setTimeout(() => window.location.href = 'login.html', 2000);

            } catch (err) {
                showError(err.message);
                btn.disabled = false;
                document.getElementById('btn-text').innerText = 'Create Landlord Account';
                document.getElementById('btn-spinner').classList.add('hidden');
            }
        });
    </script>
</body>
</html>
