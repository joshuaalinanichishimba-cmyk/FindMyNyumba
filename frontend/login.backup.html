<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Sign In - FindMyNyumba</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <link rel="icon" type="image/png" href="logo.png">
</head>
<body class="bg-slate-50 flex flex-col items-center justify-center min-h-screen">
    <div class="text-center mb-8 mt-10 flex flex-col items-center">
        <a href="browse.html" class="mb-2 w-64 md:w-80 h-20 md:h-24 overflow-hidden flex justify-center items-center relative transition-transform duration-300 hover:scale-105">
            <img src="logo.png" alt="FindMyNyumba Logo" class="absolute w-full h-full object-contain transform scale-[2.4] md:scale-[2.8] mix-blend-multiply brightness-[1.3] contrast-[1.5] saturate-125" onerror="this.style.display='none'">
        </a>
        <h1 class="text-4xl font-black text-slate-900">Sign in to your account</h1>
        <div class="mt-2 text-slate-500 flex flex-col items-center space-y-1">
            <span>Are you a student? <a href="register.html" class="text-[#ea580c] font-bold hover:underline transition-colors">Register here</a></span>
            <span>Own a property? <a href="register-landlord.html" class="text-slate-800 font-bold hover:underline border-b-2 border-slate-800 transition-colors">Register as a Landlord</a></span>
        </div>
    </div>

    <div class="w-full max-w-md bg-white rounded-xl shadow-md border border-slate-200 p-8 mb-10">
        
        <div id="error-message" class="hidden mb-4 p-3 bg-red-50 text-red-600 text-sm font-bold rounded-lg border border-red-100 flex items-center">
            <svg class="w-5 h-5 mr-2 flex-shrink-0" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M18 10a8 8 0 11-16 0 8 8 0 0116 0zm-7 4a1 1 0 11-2 0 1 1 0 012 0zm-1-9a1 1 0 00-1 1v4a1 1 0 102 0V6a1 1 0 00-1-1z" clip-rule="evenodd"></path></svg>
            <span id="error-text"></span>
        </div>

        <form id="login-form" class="space-y-4">
            <div>
                <input type="email" id="email" placeholder="Email address" required autocomplete="email" class="w-full px-4 py-3 rounded-lg border border-slate-300 focus:outline-none focus:ring-2 focus:ring-[#ea580c] transition-shadow">
            </div>
            <div>
                <input type="password" id="password" placeholder="Password" required autocomplete="current-password" class="w-full px-4 py-3 rounded-lg border border-slate-300 focus:outline-none focus:ring-2 focus:ring-[#ea580c] transition-shadow">
            </div>

            <div class="flex items-center justify-between text-sm py-2">
                <label class="flex items-center text-slate-600 cursor-pointer">
                    <input type="checkbox" id="remember-me" class="mr-2 rounded border-slate-300 text-[#ea580c] focus:ring-[#ea580c]">
                    Remember me
                </label>
                <a href="forgot-password.html" class="font-bold text-[#ea580c] hover:underline transition-colors">Forgot your password?</a>
            </div>

            <button type="submit" id="submit-btn" class="w-full bg-[#ea580c] text-white font-bold py-3 rounded-lg hover:bg-orange-600 transition duration-200 flex justify-center items-center">
                <span id="btn-text">Sign in</span>
                <svg id="btn-spinner" class="hidden animate-spin ml-2 h-5 w-5 text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg>
            </button>
        </form>

        <div class="mt-6 flex flex-col items-center">
            <div id="g_id_onload"
                 data-client_id="194165956778-4k6oied4jds8ofbbnfr98h3ueeteclmb.apps.googleusercontent.com"
                 data-context="signin"
                 data-ux_mode="popup"
                 data-callback="handleCredentialResponse"
                 data-auto_prompt="false">
            </div>
            <div class="g_id_signin"
                 data-type="standard"
                 data-shape="rectangular"
                 data-theme="outline"
                 data-text="signin_with"
                 data-size="large"
                 data-logo_alignment="left"
                 data-width="300">
            </div>
        </div>
    </div>

    <script>
        const API_BASE_URL = 'https://findmynyumba.onrender.com/api/v1';

        // Helper to display UI errors instead of alerts
        function showError(message) {
            const errorDiv = document.getElementById('error-message');
            const errorText = document.getElementById('error-text');
            errorText.innerText = message;
            errorDiv.classList.remove('hidden');
        }

        function hideError() {
            document.getElementById('error-message').classList.add('hidden');
        }

        // Helper to toggle loading state
        function setLoadingState(isLoading) {
            const btn = document.getElementById('submit-btn');
            const btnText = document.getElementById('btn-text');
            const spinner = document.getElementById('btn-spinner');
            
            btn.disabled = isLoading;
            if (isLoading) {
                btnText.innerText = 'Signing in...';
                spinner.classList.remove('hidden');
                btn.classList.add('opacity-80', 'cursor-not-allowed');
            } else {
                btnText.innerText = 'Sign in';
                spinner.classList.add('hidden');
                btn.classList.remove('opacity-80', 'cursor-not-allowed');
            }
        }

        // Helper to store tokens securely based on "Remember me" preference
        function storeSession(token, role) {
            const rememberMe = document.getElementById('remember-me').checked;
            const storage = rememberMe ? localStorage : sessionStorage;
            
            // Clear opposite storage to prevent conflicts
            (rememberMe ? sessionStorage : localStorage).removeItem('token');
            (rememberMe ? sessionStorage : localStorage).removeItem('user_role');

            storage.setItem('token', token);
            storage.setItem('user_role', role);
        }

        // Routing logic based on role
        function redirectUser(role) {
            const routes = {
                'student_host': 'dashboard-student-host.html',
                'landlord': 'dashboard-landlord.html',
                'student': 'dashboard-student.html',
                'admin': 'admin.html'
            };
            window.location.href = routes[role] || 'browse.html';
        }

        // ─── Standard Email / Password Login ─────────────────────────────────
        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            hideError();
            setLoadingState(true);

            const payload = {
                email: document.getElementById('email').value.trim(),
                password: document.getElementById('password').value
            };

            try {
                const res = await fetch(`${API_BASE_URL}/auth/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                const data = await res.json();
                
                if (!res.ok) {
                    // Fallback generic message to prevent raw DB error exposure
                    throw new Error(data.detail || 'Invalid email or password. Please try again.');
                }

                storeSession(data.access_token, data.role);
                redirectUser(data.role);

            } catch (err) {
                showError(err.message);
                setLoadingState(false);
            }
        });

        // ─── Google Login ─────────────────────────────────────────────────────
        async function handleCredentialResponse(response) {
            hideError();
            
            try {
                const res = await fetch(`${API_BASE_URL}/auth/google-login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ credential: response.credential })
                });
                
                const data = await res.json();
                
                if (!res.ok) {
                    throw new Error(data.detail || 'Google sign-in failed. Please try again or use your email.');
                }
                
                storeSession(data.access_token, data.role);
                redirectUser(data.role);

            } catch (err) {
                // Replaced alert() with UI error
                showError('Network error connecting to authentication server.');
            }
        }
    </script>
</body>
</html>
