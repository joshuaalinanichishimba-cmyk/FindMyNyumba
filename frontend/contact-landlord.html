<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Landlord - FindMyNyumba</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-gray-50 flex flex-col min-h-screen">
    <nav class="bg-white shadow-sm sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 py-4 flex justify-between items-center">
            <a href="browse.html" class="text-2xl font-black text-[#ea580c]">FindMyNyumba</a>
            <a href="browse.html" class="text-gray-600 font-bold hover:text-[#ea580c]">Back to Browse</a>
        </div>
    </nav>

    <main class="flex-grow flex items-center justify-center p-6">
        <div class="bg-white p-8 rounded-3xl shadow-lg border border-gray-100 max-w-2xl w-full">
            <h2 class="text-3xl font-black text-gray-900 mb-2">Contact Landlord</h2>
            <p class="text-gray-500 mb-8">Send a secure message directly to the property manager.</p>

            <div class="bg-gray-50 p-6 rounded-2xl border border-gray-100 mb-8 flex flex-col md:flex-row gap-6">
                <img id="prop-image" src="https://images.unsplash.com/photo-1522708323590-d24dbb6b0267?w=300" class="w-full md:w-32 h-32 object-cover rounded-xl shadow-sm">
                <div class="flex-1 space-y-2">
                    <h3 class="font-bold text-gray-700 uppercase text-xs">Property Information</h3>
                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <p class="text-xs text-gray-400">Property:</p>
                            <p id="prop-title" class="font-bold text-gray-900 truncate" title="Loading...">Loading Property...</p>
                        </div>
                        <div>
                            <p class="text-xs text-gray-400">Location:</p>
                            <p id="prop-location" class="font-bold text-gray-900 truncate" title="Loading...">Loading Location...</p>
                        </div>
                        <div>
                            <p class="text-xs text-gray-400">Price:</p>
                            <p id="prop-price" class="font-black text-[#ea580c]">Loading Price...</p>
                        </div>
                        <div>
                            <p class="text-xs text-gray-400">Available:</p>
                            <p class="font-bold text-green-600">Immediately</p>
                        </div>
                    </div>
                </div>
            </div>

            <form id="contactForm" class="space-y-6">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div>
                        <label class="block text-xs font-bold text-gray-500 uppercase mb-2">Full Name</label>
                        <input type="text" required class="w-full p-3 border rounded-xl outline-none focus:ring-2 focus:ring-[#ea580c]">
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-gray-500 uppercase mb-2">Email / Phone</label>
                        <input type="text" required class="w-full p-3 border rounded-xl outline-none focus:ring-2 focus:ring-[#ea580c]">
                    </div>
                </div>
                <div>
                    <label class="block text-xs font-bold text-gray-500 uppercase mb-2">Message</label>
                    <textarea rows="4" class="w-full p-3 border rounded-xl outline-none focus:ring-2 focus:ring-[#ea580c]" required>Hi, I am interested in this property and would like to ask a few questions.</textarea>
                </div>
                <button type="submit" class="w-full bg-[#ea580c] text-white py-4 rounded-xl font-black text-lg shadow-lg hover:bg-orange-600 transition-all">
                    <i class="fas fa-paper-plane mr-2"></i> Send Message
                </button>
            </form>
        </div>
    </main>

    <script>
        async function loadPropertyInfo() {
            const urlParams = new URLSearchParams(window.location.search);
            const propId = urlParams.get('id');
            if(!propId) {
                document.getElementById('prop-title').innerText = "Property Not Found";
                return;
            }

            try {
                // Fetch property from the API using the ID in the URL
                const res = await fetch(`http://127.0.0.1:8000/api/v1/landlord/properties/${propId}`);
                if(!res.ok) throw new Error("Failed to load");
                const data = await res.json();
                
                // Populate the UI
                document.getElementById('prop-title').innerText = data.title;
                document.getElementById('prop-title').title = data.title;
                document.getElementById('prop-location').innerText = data.location;
                document.getElementById('prop-location').title = data.location;
                document.getElementById('prop-price').innerText = "ZMW " + parseFloat(data.price).toLocaleString();
                if(data.image_url) document.getElementById('prop-image').src = data.image_url;
            } catch(e) {
                console.error(e);
                document.getElementById('prop-title').innerText = "Error loading property details.";
                document.getElementById('prop-location').innerText = "--";
                document.getElementById('prop-price').innerText = "--";
            }
        }

        document.getElementById('contactForm').onsubmit = function(e) {
            e.preventDefault();
            const btn = e.target.querySelector('button');
            btn.innerHTML = '<i class="fas fa-spinner fa-spin mr-2"></i> Sending...';
            btn.disabled = true;

            setTimeout(() => {
                alert("✅ Message sent successfully! The landlord will be notified on their dashboard.");
                window.location.href = 'browse.html';
            }, 1000);
        };

        document.addEventListener("DOMContentLoaded", loadPropertyInfo);
    </script>
</body>
</html>
