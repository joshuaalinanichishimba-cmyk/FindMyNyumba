<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Forgot Password - FindMyNyumba</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 flex flex-col items-center justify-center min-h-screen">
    
    <div class="w-full max-w-md bg-white rounded-xl shadow-md border border-slate-200 p-8 mb-10">
        <h2 class="text-3xl font-black text-slate-900 text-center mb-2">Reset Password</h2>
        <p class="text-slate-500 text-center mb-6 text-sm">Enter your account email and we will send you a secure reset link.</p>

        <form id="forgot-form" class="space-y-4">
            <div>
                <input type="email" id="email" placeholder="Email address" required class="w-full px-4 py-3 rounded-lg border border-slate-300 focus:outline-none focus:ring-2 focus:ring-[#ea580c]">
            </div>

            <button type="submit" id="submit-btn" class="w-full bg-[#ea580c] text-white font-bold py-3 rounded-lg hover:bg-orange-600 transition duration-200">
                Send Reset Link
            </button>
        </form>

        <div id="success-message" class="hidden mt-4 p-3 bg-green-50 text-green-700 text-sm font-bold rounded-lg border border-green-200 text-center">
            Link sent! Check your email (or the backend terminal).
        </div>

        <div class="mt-6 text-center">
            <a href="login.html" class="font-bold text-slate-600 hover:text-[#ea580c]">← Back to Sign In</a>
        </div>
    </div>

    <script>
        document.getElementById('forgot-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const btn = document.getElementById('submit-btn');
            const msgBox = document.getElementById('success-message');
            
            btn.disabled = true;
            btn.innerText = 'Sending...';

            try {
                // Tells the backend to generate the reset link
                await fetch(`http://localhost:8000/api/v1/auth/request-reset?email=${email}`, {
                    method: 'POST'
                });
                
                // Show success message regardless of if email exists (security best practice)
                msgBox.classList.remove('hidden');
                btn.innerText = 'Link Sent';
            } catch (err) {
                alert("Make sure your backend server is running!");
                btn.disabled = false;
                btn.innerText = 'Send Reset Link';
            }
        });
    </script>
</body>
</html>
