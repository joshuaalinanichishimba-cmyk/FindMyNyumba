<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Forgot Password - FindMyNyumba</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="icon" type="image/png" href="logo.png">
</head>
<body class="bg-slate-50 flex flex-col items-center justify-center min-h-screen">
    
    <div class="w-full max-w-md bg-white rounded-xl shadow-md border border-slate-200 p-8 mb-10">
        <h2 class="text-3xl font-black text-slate-900 text-center mb-2">Reset Password</h2>
        <p class="text-slate-500 text-center mb-6 text-sm">Enter your account email and we will send you a secure reset link.</p>

        <div id="error-message" class="hidden mb-4 p-3 bg-red-50 text-red-600 text-sm font-bold rounded-lg border border-red-100 flex items-start">
            <svg class="w-5 h-5 mr-2 mt-0.5 flex-shrink-0" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M18 10a8 8 0 11-16 0 8 8 0 0116 0zm-7 4a1 1 0 11-2 0 1 1 0 012 0zm-1-9a1 1 0 00-1 1v4a1 1 0 102 0V6a1 1 0 00-1-1z" clip-rule="evenodd"></path></svg>
            <span id="error-text"></span>
        </div>

        <form id="forgot-form" class="space-y-4">
            <div>
                <input type="email" id="email" placeholder="Email address" required class="w-full px-4 py-3 rounded-lg border border-slate-300 focus:outline-none focus:ring-2 focus:ring-[#ea580c] transition-shadow">
            </div>

            <button type="submit" id="submit-btn" class="w-full bg-[#ea580c] text-white font-bold py-3 rounded-lg hover:bg-orange-600 transition duration-200 flex justify-center items-center">
                <span id="btn-text">Send Reset Link</span>
                <svg id="btn-spinner" class="hidden animate-spin ml-2 h-5 w-5 text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg>
            </button>
        </form>

        <div id="success-message" class="hidden mt-4 p-3 bg-green-50 text-green-700 text-sm font-bold rounded-lg border border-green-200 text-center flex items-center justify-center">
            <svg class="w-5 h-5 mr-2 flex-shrink-0" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zm3.707-9.293a1 1 0 00-1.414-1.414L9 10.586 7.707 9.293a1 1 0 00-1.414 1.414l2 2a1 1 0 001.414 0l4-4z" clip-rule="evenodd"></path></svg>
            Link sent! Check your email.
        </div>

        <div class="mt-6 text-center">
            <a href="login.html" class="font-bold text-slate-600 hover:text-[#ea580c] transition-colors">â† Back to Sign In</a>
        </div>
    </div>

    <script>
        const API_BASE_URL = 'http://127.0.0.1:8000/api/v1';

        document.getElementById('forgot-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const btn = document.getElementById('submit-btn');
            const btnText = document.getElementById('btn-text');
            const spinner = document.getElementById('btn-spinner');
            const msgBox = document.getElementById('success-message');
            const errorBox = document.getElementById('error-message');
            
            errorBox.classList.add('hidden');
            btn.disabled = true;
            btnText.innerText = 'Sending...';
            spinner.classList.remove('hidden');

            try {
                const res = await fetch(`${API_BASE_URL}/auth/request-reset?email=${encodeURIComponent(email)}`, {
                    method: 'POST'
                });
                
                // Security best practice: Always show success even if email doesn't exist
                // to prevent email enumeration attacks.
                msgBox.classList.remove('hidden');
                document.getElementById('forgot-form').classList.add('hidden');
            } catch (err) {
                document.getElementById('error-text').innerText = "Network error. Please try again later.";
                errorBox.classList.remove('hidden');
                btn.disabled = false;
                btnText.innerText = 'Send Reset Link';
                spinner.classList.add('hidden');
            }
        });
    </script>
</body>
</html>
