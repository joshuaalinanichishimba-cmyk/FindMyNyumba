<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Sign In - FindMyNyumba</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
</head>
<body class="bg-slate-50 flex flex-col items-center justify-center min-h-screen">
    <div class="text-center mb-8 mt-10 flex flex-col items-center">
        <a href="browse.html" class="mb-2 w-64 md:w-80 h-20 md:h-24 overflow-hidden flex justify-center items-center relative transition-transform duration-300 hover:scale-105">
            <img src="logo.png" alt="FindMyNyumba Logo" class="absolute w-full h-full object-contain transform scale-[2.4] md:scale-[2.8] mix-blend-multiply brightness-[1.3] contrast-[1.5] saturate-125" onerror="this.style.display='none'">
        </a>
        <h1 class="text-4xl font-black text-slate-900">Sign in to your account</h1>
                <div class="mt-2 text-slate-500 flex flex-col items-center space-y-1">
            <span>Are you a student? <a href="register.html" class="text-[#ea580c] font-bold hover:underline">Register here</a></span>
            <span>Own a property? <a href="register-landlord.html" class="text-slate-800 font-bold hover:underline border-b-2 border-slate-800">Register as a Landlord</a></span>
        </div>
    </div>

    <div class="w-full max-w-md bg-white rounded-xl shadow-md border border-slate-200 p-8 mb-10">
        <div id="error-message" class="hidden mb-4 p-3 bg-red-50 text-red-600 text-sm font-bold rounded-lg border border-red-100"></div>

        <form id="login-form" class="space-y-4">
            <div>
                <input type="email" id="email" placeholder="Email address" required class="w-full px-4 py-3 rounded-lg border border-slate-300 focus:outline-none focus:ring-2 focus:ring-[#ea580c]">
            </div>
            <div>
                <input type="password" id="password" placeholder="Password" required class="w-full px-4 py-3 rounded-lg border border-slate-300 focus:outline-none focus:ring-2 focus:ring-[#ea580c]">
            </div>

            <div class="flex items-center justify-between text-sm py-2">
                <label class="flex items-center text-slate-600">
                    <input type="checkbox" class="mr-2 rounded border-slate-300 text-[#ea580c] focus:ring-[#ea580c]">
                    Remember me
                </label>
                <a href="forgot-password.html" class="font-bold text-[#ea580c] hover:underline">Forgot your password?</a>
            </div>

            <button type="submit" class="w-full bg-[#ea580c] text-white font-bold py-3 rounded-lg hover:bg-orange-600 transition duration-200">
                Sign in
            </button>
        </form>

        <div class="mt-6 flex flex-col items-center">
            <div id="g_id_onload"
                 data-client_id="194165956778-4k6oied4jds8ofbbnfr98h3ueeteclmb.apps.googleusercontent.com"
                 data-context="signin"
                 data-ux_mode="popup"
                 data-callback="handleCredentialResponse"
                 data-auto_prompt="false">
            </div>
            <div class="g_id_signin"
                 data-type="standard"
                 data-shape="rectangular"
                 data-theme="outline"
                 data-text="signin_with"
                 data-size="large"
                 data-logo_alignment="left"
                 data-width="300">
            </div>
        </div>
    </div>

    <script>
        // 1. Standard Login Logic
        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = e.target.querySelector('button[type="submit"]');
            const errorDiv = document.getElementById('error-message');
            btn.disabled = true;
            btn.innerText = 'Signing in...';
            errorDiv.classList.add('hidden');

            const payload = {
                email: document.getElementById('email').value,
                password: document.getElementById('password').value
            };

            try {
                const res = await fetch('http://localhost:8000/api/v1/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                
                const data = await res.json();
                if (!res.ok) throw new Error(data.detail || 'Invalid email or password');

                localStorage.setItem('token', data.access_token);
                localStorage.setItem('user_role', data.role);
                
                let destination = 'browse.html';
                if (data.role === 'student') destination = 'dashboard-student.html';
                else if (data.role === 'student_host') destination = 'dashboard-student-host.html';
                else if (data.role === 'landlord') destination = 'dashboard-landlord.html';
                window.location.href = destination;
    
            } catch (err) {
                errorDiv.innerText = err.message;
                errorDiv.classList.remove('hidden');
                btn.disabled = false;
                btn.innerText = 'Sign in';
            }
        });

        // 2. Google Login Logic
        async function handleCredentialResponse(response) {
            try {
                const res = await fetch('http://localhost:8000/api/v1/auth/google-login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ credential: response.credential })
                });
                const data = await res.json();
                if (res.ok) {
                    localStorage.setItem('token', data.access_token);
                    localStorage.setItem('user_role', data.role);
                    window.location.href = 'browse.html';
                } else {
                    alert("Google login failed: " + data.detail);
                }
            } catch (err) {
                alert("Network error. Make sure your Python backend is running!");
            }
        }
    </script>
<script>
    async function handleManualLogin(e) {
        e.preventDefault();
        const email = document.querySelector('input[type="email"]').value;
        const password = document.querySelector('input[type="password"]').value;
        const btn = e.target.querySelector('button[type="submit"]');
        
        btn.innerText = 'Signing in...';
        btn.disabled = true;

        try {
            const response = await fetch('http://127.0.0.1:8000/api/v1/auth/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email, password })
            });

            const data = await response.json();

            if (response.ok && data.access_token) {
                // CRITICAL: Save the token so the dashboard allows us in!
                localStorage.setItem('access_token', data.access_token);
                localStorage.setItem('user_role', data.role || 'student');
                
                console.log("Login successful, redirecting...");
                window.location.href = 'dashboard-student.html';
            } else {
                alert('❌ Login Failed: ' + (data.detail || 'Check your credentials'));
                btn.innerText = 'Sign in';
                btn.disabled = false;
            }
        } catch (error) {
            console.error("Login Error:", error);
            alert('❌ Server is offline or connection refused.');
            btn.innerText = 'Sign in';
            btn.disabled = false;
        }
    }

    // Ensure the form is wired to this function
    document.addEventListener('DOMContentLoaded', () => {
        const loginForm = document.querySelector('form');
        if (loginForm) {
            loginForm.onsubmit = handleManualLogin;
        }
    });
</script>
</body>
</html>
