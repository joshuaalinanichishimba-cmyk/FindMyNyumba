<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In - FindMyNyumba</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
</head>
<body class="bg-slate-50 flex flex-col items-center justify-center min-h-screen px-4 py-10">

    <div class="text-center mb-8 flex flex-col items-center">
        <a href="browse.html" class="mb-3 w-56 h-20 overflow-hidden flex justify-center items-center relative transition-transform duration-300 hover:scale-105">
            <img src="logo.png" alt="FindMyNyumba Logo"
                 class="absolute w-full h-full object-contain transform scale-[2.4] mix-blend-multiply brightness-[1.3] contrast-[1.5] saturate-125"
                 onerror="this.style.display='none'; document.getElementById('logo-text').classList.remove('hidden')">
        </a>
        <span id="logo-text" class="hidden text-2xl font-black text-[#ea580c] mb-2">FindMyNyumba</span>
        <h1 class="text-3xl md:text-4xl font-black text-slate-900">Sign in to your account</h1>
        <div class="mt-2 text-slate-500 flex flex-col items-center space-y-1 text-sm">
            <span>Are you a student? <a href="register.html" class="text-[#ea580c] font-bold hover:underline">Register here</a></span>
            <span>Own a property? <a href="register-landlord.html" class="text-slate-800 font-bold hover:underline border-b-2 border-slate-800">Register as a Landlord</a></span>
        </div>
    </div>

    <div class="w-full max-w-md bg-white rounded-2xl shadow-md border border-slate-200 p-6 md:p-8 mb-10">

        <div id="error-message" class="hidden mb-4 p-3 bg-red-50 text-red-600 text-sm font-semibold rounded-xl border border-red-100 flex items-center gap-2">
            <svg class="w-5 h-5 flex-shrink-0" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M18 10a8 8 0 11-16 0 8 8 0 0116 0zm-7 4a1 1 0 11-2 0 1 1 0 012 0zm-1-9a1 1 0 00-1 1v4a1 1 0 102 0V6a1 1 0 00-1-1z" clip-rule="evenodd"></path></svg>
            <span id="error-text"></span>
        </div>

        <form id="login-form" class="space-y-4" novalidate>
            <div>
                <input type="email" id="email" placeholder="Email address" required autocomplete="email"
                    class="w-full px-4 py-3 rounded-xl border border-slate-300 focus:outline-none focus:ring-2 focus:ring-[#ea580c] transition-shadow text-sm">
            </div>
            <div>
                <input type="password" id="password" placeholder="Password" required autocomplete="current-password"
                    class="w-full px-4 py-3 rounded-xl border border-slate-300 focus:outline-none focus:ring-2 focus:ring-[#ea580c] transition-shadow text-sm">
            </div>

            <div class="flex items-center justify-between text-sm py-1">
                <label class="flex items-center text-slate-600 cursor-pointer gap-2">
                    <input type="checkbox" id="remember-me" class="rounded border-slate-300 text-[#ea580c] focus:ring-[#ea580c]">
                    Remember me
                </label>
                <a href="forgot-password.html" class="font-bold text-[#ea580c] hover:underline">Forgot password?</a>
            </div>

            <button type="submit" id="submit-btn"
                class="w-full bg-[#ea580c] text-white font-bold py-3 rounded-xl hover:bg-orange-700 transition duration-200 flex justify-center items-center gap-2 text-sm">
                <span id="btn-text">Sign in</span>
                <svg id="btn-spinner" class="hidden animate-spin h-4 w-4 text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                    <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                    <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                </svg>
            </button>
        </form>

        <div class="mt-6 flex flex-col items-center gap-4">
            <div class="w-full flex items-center gap-3">
                <div class="flex-1 h-px bg-slate-200"></div>
                <span class="text-xs text-slate-400 font-medium">or continue with</span>
                <div class="flex-1 h-px bg-slate-200"></div>
            </div>
            <div id="g_id_onload"
                 data-client_id="194165956778-4k6oied4jds8ofbbnfr98h3ueeteclmb.apps.googleusercontent.com"
                 data-context="signin"
                 data-ux_mode="popup"
                 data-callback="handleCredentialResponse"
                 data-auto_prompt="false">
            </div>
            <div class="g_id_signin"
                 data-type="standard"
                 data-shape="rectangular"
                 data-theme="outline"
                 data-text="signin_with"
                 data-size="large"
                 data-logo_alignment="left"
                 data-width="300">
            </div>
        </div>
    </div>

    <script>
        const API_BASE_URL = 'https://findmynyumba.onrender.com/api/v1';

        // Redirect if already logged in
        (function() {
            const token = localStorage.getItem('token') || sessionStorage.getItem('token');
            const role  = localStorage.getItem('role')  || sessionStorage.getItem('role');
            if (token && role) redirectUser(role);
        })();

        function showError(message) {
            document.getElementById('error-text').innerText = message;
            document.getElementById('error-message').classList.remove('hidden');
        }

        function hideError() {
            document.getElementById('error-message').classList.add('hidden');
        }

        function setLoading(isLoading) {
            const btn = document.getElementById('submit-btn');
            btn.disabled = isLoading;
            document.getElementById('btn-text').innerText = isLoading ? 'Signing in...' : 'Sign in';
            document.getElementById('btn-spinner').classList.toggle('hidden', !isLoading);
            btn.classList.toggle('opacity-75', isLoading);
        }

        function storeSession(token, role) {
            const remember = document.getElementById('remember-me').checked;
            const keep   = remember ? localStorage   : sessionStorage;
            const discard = remember ? sessionStorage : localStorage;
            // Clear both first to prevent stale conflicts
            discard.removeItem('token');
            discard.removeItem('role');
            keep.setItem('token', token);
            keep.setItem('role', role);
        }

        function redirectUser(role) {
            const routes = {
                student_host: 'dashboard-student-host.html',
                landlord:     'dashboard-landlord.html',
                student:      'dashboard-student.html',
                admin:        'admin.html'
            };
            window.location.href = routes[role] || 'browse.html';
        }

        // ── Email / Password login ───────────────────────────────────────────
        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            hideError();

            const email    = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;

            if (!email || !password) {
                showError('Please enter your email and password.');
                return;
            }

            setLoading(true);

            try {
                const res = await fetch(`${API_BASE_URL}/auth/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });

                const data = await res.json();

                if (!res.ok) {
                    throw new Error(data.detail || 'Invalid email or password. Please try again.');
                }

                storeSession(data.access_token, data.role);
                redirectUser(data.role);

            } catch (err) {
                showError(err.message);
                setLoading(false);
            }
        });

        // ── Google Sign-In ───────────────────────────────────────────────────
        async function handleCredentialResponse(response) {
            hideError();
            try {
                const res = await fetch(`${API_BASE_URL}/auth/google-login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ credential: response.credential })
                });

                const data = await res.json();

                if (!res.ok) {
                    throw new Error(data.detail || 'Google sign-in failed. Please try again.');
                }

                // Google logins always use localStorage (persistent)
                localStorage.setItem('token', data.access_token);
                localStorage.setItem('role',  data.role);
                redirectUser(data.role);

            } catch (err) {
                showError(err.message || 'Network error connecting to authentication server.');
            }
        }
    </script>
</body>
</html>
