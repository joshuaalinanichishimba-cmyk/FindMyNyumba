<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In - FindMyNyumba</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="icon" type="image/png" href="logo.png">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800;900&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen flex flex-col">

    <!-- TOP BAR -->
    <div class="bg-white border-b border-slate-100 px-4 py-3 flex items-center justify-between">
        <a href="index.html" class="flex items-center gap-2 text-slate-500 hover:text-slate-800 text-sm font-semibold transition-colors">
            <i class="fas fa-arrow-left text-xs"></i> Back to Home
        </a>
        <div class="flex gap-3 text-sm font-semibold text-slate-500">
            <a href="help.html" class="hover:text-[#ea580c] transition-colors">Help</a>
        </div>
    </div>

    <div class="flex-1 flex flex-col items-center justify-center px-4 py-10">

        <!-- LOGO -->
        <div class="text-center mb-8 flex flex-col items-center">
            <a href="index.html" class="mb-4 flex items-center justify-center" style="padding: 10px 20px; background-color: #f8fafc; border-radius: 16px;">
                <img src="logo.png" alt="FindMyNyumba"
                     style="height:60px; width:auto; display:block; object-fit:contain;"
                     onerror="this.style.display='none'; document.getElementById('logo-text').classList.remove('hidden')">
                <span id="logo-text" class="hidden text-2xl font-black text-[#ea580c]">FindMyNyumba</span>
            </a>
            <h1 class="text-2xl sm:text-3xl md:text-4xl font-black text-slate-900">Sign in to your account</h1>
            <div class="mt-3 text-slate-500 flex flex-col items-center space-y-1.5 text-sm font-medium">
                <span>Are you a student? <a href="register.html" class="text-[#ea580c] font-bold hover:underline">Register here</a></span>
                <span>Own a property? <a href="register-landlord.html" class="text-slate-800 font-bold hover:underline border-b-2 border-slate-800">Register as a Landlord</a></span>
            </div>
        </div>

        <div class="w-full max-w-md bg-white rounded-2xl shadow-sm border border-slate-200 p-6 md:p-8 mb-10">

            <div id="error-message" class="hidden mb-4 p-4 bg-red-50 text-red-600 text-sm font-semibold rounded-xl border border-red-100 flex items-start gap-2">
                <i class="fas fa-exclamation-circle flex-shrink-0 mt-0.5"></i>
                <span id="error-text"></span>
            </div>

            <form id="login-form" class="space-y-4" novalidate>
                <div>
                    <label class="block text-xs font-bold text-slate-500 uppercase tracking-wide mb-1.5">Email Address</label>
                    <input type="email" id="email" placeholder="you@example.com" required autocomplete="email"
                        class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:outline-none focus:ring-2 focus:ring-[#ea580c] focus:border-transparent transition-all text-sm font-medium bg-slate-50 focus:bg-white">
                </div>
                <div>
                    <label class="block text-xs font-bold text-slate-500 uppercase tracking-wide mb-1.5">Password</label>
                    <div class="relative">
                        <input type="password" id="password" placeholder="Enter your password" required autocomplete="current-password"
                            class="w-full px-4 py-3 pr-11 rounded-xl border border-slate-200 focus:outline-none focus:ring-2 focus:ring-[#ea580c] focus:border-transparent transition-all text-sm font-medium bg-slate-50 focus:bg-white">
                        <button type="button" onclick="togglePassword()" class="absolute right-3 top-1/2 -translate-y-1/2 text-slate-400 hover:text-slate-600 transition-colors">
                            <i id="pw-eye" class="fas fa-eye text-sm"></i>
                        </button>
                    </div>
                </div>

                <div class="flex items-center justify-between text-sm py-1">
                    <label class="flex items-center text-slate-600 cursor-pointer gap-2 font-medium">
                        <input type="checkbox" id="remember-me" class="rounded border-slate-300 text-[#ea580c] focus:ring-[#ea580c]">
                        Remember me
                    </label>
                    <a href="forgot-password.html" class="font-bold text-[#ea580c] hover:underline text-xs">Forgot password?</a>
                </div>

                <button type="submit" id="submit-btn"
                    class="w-full bg-[#ea580c] text-white font-black py-3.5 rounded-xl hover:bg-orange-700 transition-all duration-200 flex justify-center items-center gap-2 text-sm shadow-md shadow-orange-200 active:scale-[0.98]">
                    <span id="btn-text">Sign In</span>
                    <svg id="btn-spinner" class="hidden animate-spin h-4 w-4 text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                        <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                        <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                    </svg>
                </button>
            </form>

            <div class="mt-6 flex flex-col items-center gap-4">
                <div class="w-full flex items-center gap-3">
                    <div class="flex-1 h-px bg-slate-200"></div>
                    <span class="text-xs text-slate-400 font-semibold uppercase tracking-wide">or continue with</span>
                    <div class="flex-1 h-px bg-slate-200"></div>
                </div>
                <div id="g_id_onload"
                     data-client_id="194165956778-4k6oied4jds8ofbbnfr98h3ueeteclmb.apps.googleusercontent.com"
                     data-context="signin"
                     data-ux_mode="popup"
                     data-callback="handleCredentialResponse"
                     data-auto_prompt="false">
                </div>
                <div class="g_id_signin"
                     data-type="standard"
                     data-shape="rectangular"
                     data-theme="outline"
                     data-text="signin_with"
                     data-size="large"
                     data-logo_alignment="left"
                     data-width="300">
                </div>
            </div>
        </div>

        <p class="text-center text-xs text-slate-400 font-medium pb-8">
            By signing in you agree to our <a href="terms.html" class="text-[#ea580c] hover:underline">Terms</a> and <a href="privacy.html" class="text-[#ea580c] hover:underline">Privacy Policy</a>
        </p>
    </div>

    <script>
        const API_BASE_URL = 'https://findmynyumba-backend.onrender.com/api/v1';

        (function() {
            const token = localStorage.getItem('token') || sessionStorage.getItem('token');
            const role  = localStorage.getItem('role')  || sessionStorage.getItem('role');
            if (token && role) redirectUser(role);
        })();

        function togglePassword() {
            const pw = document.getElementById('password');
            const eye = document.getElementById('pw-eye');
            if (pw.type === 'password') {
                pw.type = 'text';
                eye.className = 'fas fa-eye-slash text-sm';
            } else {
                pw.type = 'password';
                eye.className = 'fas fa-eye text-sm';
            }
        }

        function showError(message) {
            document.getElementById('error-text').innerText = message;
            document.getElementById('error-message').classList.remove('hidden');
        }

        function hideError() {
            document.getElementById('error-message').classList.add('hidden');
        }

        function setLoading(isLoading) {
            const btn = document.getElementById('submit-btn');
            btn.disabled = isLoading;
            document.getElementById('btn-text').innerText = isLoading ? 'Signing in...' : 'Sign In';
            document.getElementById('btn-spinner').classList.toggle('hidden', !isLoading);
            btn.classList.toggle('opacity-75', isLoading);
        }

        function storeSession(token, role) {
            const remember = document.getElementById('remember-me').checked;
            const keep   = remember ? localStorage   : sessionStorage;
            const discard = remember ? sessionStorage : localStorage;
            discard.removeItem('token');
            discard.removeItem('role');
            keep.setItem('token', token);
            keep.setItem('role', role);
        }

        function redirectUser(role) {
            const routes = {
                student_host: 'dashboard-student-host.html',
                landlord:     'dashboard-landlord.html',
                student:      'dashboard-student.html',
                admin:        'admin.html'
            };
            window.location.href = routes[role] || 'browse.html';
        }

        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            hideError();

            const email    = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;

            if (!email || !password) {
                showError('Please enter your email and password.');
                return;
            }

            setLoading(true);

            try {
                const res = await fetch(`${API_BASE_URL}/auth/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });

                const data = await res.json();

                if (!res.ok) {
                    throw new Error(data.detail || 'Invalid email or password. Please try again.');
                }

                storeSession(data.access_token, data.role);
                redirectUser(data.role);

            } catch (err) {
                showError(err.message);
                setLoading(false);
            }
        });

        async function handleCredentialResponse(response) {
            hideError();
            try {
                const res = await fetch(`${API_BASE_URL}/auth/google-login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ credential: response.credential })
                });

                const data = await res.json();

                if (!res.ok) {
                    throw new Error(data.detail || 'Google sign-in failed. Please try again.');
                }

                localStorage.setItem('token', data.access_token);
                localStorage.setItem('role',  data.role);
                redirectUser(data.role);

            } catch (err) {
                showError(err.message || 'Network error connecting to authentication server.');
            }
        }
    </script>
</body>
</html>
