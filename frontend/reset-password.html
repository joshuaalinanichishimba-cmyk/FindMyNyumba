<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Create New Password - FindMyNyumba</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="icon" type="image/png" href="logo.png">
</head>
<body class="bg-slate-50 flex flex-col items-center justify-center min-h-screen">
    
    <div class="w-full max-w-md bg-white rounded-xl shadow-md border border-slate-200 p-8 mb-10">
        <h2 class="text-3xl font-black text-slate-900 text-center mb-2">New Password</h2>
        <p class="text-slate-500 text-center mb-6 text-sm">Please enter your strong new password below.</p>

        <div id="error-message" class="hidden mb-4 p-3 bg-red-50 text-red-600 text-sm font-bold rounded-lg border border-red-100 flex items-start">
            <svg class="w-5 h-5 mr-2 mt-0.5 flex-shrink-0" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M18 10a8 8 0 11-16 0 8 8 0 0116 0zm-7 4a1 1 0 11-2 0 1 1 0 012 0zm-1-9a1 1 0 00-1 1v4a1 1 0 102 0V6a1 1 0 00-1-1z" clip-rule="evenodd"></path></svg>
            <span id="error-text"></span>
        </div>

        <div id="success-message" class="hidden mb-4 p-4 bg-green-50 text-green-700 text-sm font-bold rounded-lg border border-green-200 flex flex-col items-center text-center">
            <svg class="w-8 h-8 mb-2 flex-shrink-0 text-green-500" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zm3.707-9.293a1 1 0 00-1.414-1.414L9 10.586 7.707 9.293a1 1 0 00-1.414 1.414l2 2a1 1 0 001.414 0l4-4z" clip-rule="evenodd"></path></svg>
            <span>Password updated successfully! Redirecting to login...</span>
        </div>

        <form id="reset-form" class="space-y-4">
            <div>
                <input type="password" id="new-password" placeholder="New Password" required class="w-full px-4 py-3 rounded-lg border border-slate-300 focus:outline-none focus:ring-2 focus:ring-[#ea580c] transition-shadow">
                
                <div class="mt-2 hidden" id="pwd-strength-container">
                    <div class="flex justify-between mb-1">
                        <span class="text-xs font-bold text-slate-500">Strength</span>
                        <span class="text-xs font-bold" id="pwd-strength-text">Weak</span>
                    </div>
                    <div class="w-full bg-slate-200 rounded-full h-1.5 flex gap-1">
                        <div class="h-1.5 w-1/3 rounded-full transition-all duration-300" id="pwd-bar-1"></div>
                        <div class="h-1.5 w-1/3 rounded-full transition-all duration-300" id="pwd-bar-2"></div>
                        <div class="h-1.5 w-1/3 rounded-full transition-all duration-300" id="pwd-bar-3"></div>
                    </div>
                    <p class="text-[10px] text-slate-500 mt-1">Must be 8-12 chars, 1 uppercase, 1 lowercase, 1 number, 1 special character.</p>
                </div>
            </div>
            <div>
                <input type="password" id="confirm-password" placeholder="Confirm New Password" required class="w-full px-4 py-3 rounded-lg border border-slate-300 focus:outline-none focus:ring-2 focus:ring-[#ea580c] transition-shadow">
            </div>

            <button type="submit" id="submit-btn" class="w-full bg-[#ea580c] text-white font-bold py-3 rounded-lg hover:bg-orange-600 transition duration-200 flex justify-center items-center">
                <span id="btn-text">Save New Password</span>
                <svg id="btn-spinner" class="hidden animate-spin ml-2 h-5 w-5 text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg>
            </button>
        </form>
    </div>

    <script>
        const API_BASE_URL = 'https://findmynyumba.onrender.com/api/v1';

        function showError(msg) {
            document.getElementById('error-text').innerText = msg;
            document.getElementById('error-message').classList.remove('hidden');
        }

        // Password Strength Logic
        document.getElementById('new-password').addEventListener('input', (e) => {
            const val = e.target.value;
            const container = document.getElementById('pwd-strength-container');
            if (val.length > 0) container.classList.remove('hidden');
            else container.classList.add('hidden');

            let strength = 0;
            if (val.length >= 8 && val.length <= 12) strength++;
            if (/[A-Z]/.test(val) && /[a-z]/.test(val)) strength++;
            if (/[0-9]/.test(val) && /[^A-Za-z0-9]/.test(val)) strength++;

            const text = document.getElementById('pwd-strength-text');
            const b1 = document.getElementById('pwd-bar-1');
            const b2 = document.getElementById('pwd-bar-2');
            const b3 = document.getElementById('pwd-bar-3');

            b1.className = b2.className = b3.className = 'h-1.5 w-1/3 rounded-full transition-all duration-300 bg-slate-200';

            if (strength === 1) { 
                text.innerText = 'Weak'; text.className = 'text-xs font-bold text-red-500'; 
                b1.classList.replace('bg-slate-200', 'bg-red-500'); 
            } else if (strength === 2) { 
                text.innerText = 'Medium'; text.className = 'text-xs font-bold text-yellow-500'; 
                b1.classList.replace('bg-slate-200', 'bg-yellow-500'); b2.classList.replace('bg-slate-200', 'bg-yellow-500'); 
            } else if (strength >= 3) { 
                text.innerText = 'Strong'; text.className = 'text-xs font-bold text-green-500'; 
                b1.classList.replace('bg-slate-200', 'bg-green-500'); b2.classList.replace('bg-slate-200', 'bg-green-500'); b3.classList.replace('bg-slate-200', 'bg-green-500'); 
            }
        });

        document.getElementById('reset-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const newPwd = document.getElementById('new-password').value;
            const confirmPwd = document.getElementById('confirm-password').value;
            const btn = document.getElementById('submit-btn');
            const btnText = document.getElementById('btn-text');
            const spinner = document.getElementById('btn-spinner');
            const errorBox = document.getElementById('error-message');
            
            errorBox.classList.add('hidden');
            
            if (newPwd !== confirmPwd) {
                return showError("Passwords do not match!");
            }

            const pwdRegex = /^(?=.*[a-z])(?=.*[A-Z])(?=.*\d)(?=.*[^A-Za-z0-9])[A-Za-z\d\D]{8,12}$/;
            if (!pwdRegex.test(newPwd)) {
                return showError("Password must be 8-12 characters and include an uppercase letter, lowercase letter, number, and special character.");
            }

            // Extract the magic token from the URL
            const urlParams = new URLSearchParams(window.location.search);
            const token = urlParams.get('token');

            if (!token) {
                return showError("Invalid or missing reset token.");
            }

            btn.disabled = true;
            btnText.innerText = 'Saving...';
            spinner.classList.remove('hidden');

            try {
                const res = await fetch(`${API_BASE_URL}/auth/confirm-reset`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ token: token, new_password: newPwd })
                });
                
                const data = await res.json();
                if (res.ok) {
                    document.getElementById('reset-form').classList.add('hidden');
                    document.getElementById('success-message').classList.remove('hidden');
                    setTimeout(() => window.location.href = 'login.html', 2000);
                } else {
                    throw new Error(data.detail || "Failed to reset password. Link may be expired.");
                }
            } catch (err) {
                showError(err.message);
                btn.disabled = false;
                btnText.innerText = 'Save New Password';
                spinner.classList.add('hidden');
            }
        });
    </script>
</body>
</html>
