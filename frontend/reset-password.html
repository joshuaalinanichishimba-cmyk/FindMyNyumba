<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Create New Password - FindMyNyumba</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 flex flex-col items-center justify-center min-h-screen">
    
    <div class="w-full max-w-md bg-white rounded-xl shadow-md border border-slate-200 p-8 mb-10">
        <h2 class="text-3xl font-black text-slate-900 text-center mb-2">New Password</h2>
        <p class="text-slate-500 text-center mb-6 text-sm">Please enter your new password below.</p>

        <form id="reset-form" class="space-y-4">
            <div>
                <input type="password" id="new-password" placeholder="New Password" required class="w-full px-4 py-3 rounded-lg border border-slate-300 focus:outline-none focus:ring-2 focus:ring-[#ea580c]">
            </div>
            <div>
                <input type="password" id="confirm-password" placeholder="Confirm New Password" required class="w-full px-4 py-3 rounded-lg border border-slate-300 focus:outline-none focus:ring-2 focus:ring-[#ea580c]">
            </div>

            <button type="submit" id="submit-btn" class="w-full bg-[#ea580c] text-white font-bold py-3 rounded-lg hover:bg-orange-600 transition duration-200">
                Save New Password
            </button>
        </form>

        <div id="error-message" class="hidden mt-4 p-3 bg-red-50 text-red-600 text-sm font-bold rounded-lg border border-red-200 text-center"></div>
        <div id="success-message" class="hidden mt-4 p-3 bg-green-50 text-green-700 text-sm font-bold rounded-lg border border-green-200 text-center">
            Password updated! <a href="login.html" class="underline">Click here to log in.</a>
        </div>
    </div>

    <script>
        document.getElementById('reset-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const newPwd = document.getElementById('new-password').value;
            const confirmPwd = document.getElementById('confirm-password').value;
            const btn = document.getElementById('submit-btn');
            const errorBox = document.getElementById('error-message');
            const successBox = document.getElementById('success-message');
            
            errorBox.classList.add('hidden');
            
            if (newPwd !== confirmPwd) {
                errorBox.innerText = "Passwords do not match!";
                errorBox.classList.remove('hidden');
                return;
            }

            // Extract the magic token from the URL
            const urlParams = new URLSearchParams(window.location.search);
            const token = urlParams.get('token');

            btn.disabled = true;
            btn.innerText = 'Saving...';

            try {
                const res = await fetch('http://localhost:8000/api/v1/auth/confirm-reset', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ token: token, new_password: newPwd })
                });
                
                if (res.ok) {
                    successBox.classList.remove('hidden');
                    btn.style.display = 'none';
                } else {
                    throw new Error("Failed to reset password.");
                }
            } catch (err) {
                errorBox.innerText = err.message;
                errorBox.classList.remove('hidden');
                btn.disabled = false;
                btn.innerText = 'Save New Password';
            }
        });
    </script>
</body>
</html>
