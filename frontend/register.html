<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Registration - FindMyNyumba</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="icon" type="image/png" href="logo.png">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800;900&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen flex flex-col">

    <!-- TOP BAR -->
    <div class="bg-white border-b border-slate-100 px-4 py-3 flex items-center justify-between">
        <a href="index.html" class="flex items-center gap-2 text-slate-500 hover:text-slate-800 text-sm font-semibold transition-colors">
            <i class="fas fa-arrow-left text-xs"></i> Back to Home
        </a>
        <div class="flex gap-3 text-sm font-semibold text-slate-500">
            <a href="help.html" class="hover:text-[#ea580c] transition-colors">Help</a>
        </div>
    </div>

    <div class="flex-1 flex flex-col items-center justify-center px-4 py-10">

        <!-- LOGO -->
        <div class="text-center mb-8 flex flex-col items-center">
            <a href="index.html" class="mb-4 flex items-center justify-center" style="padding: 10px 20px; background-color: #f8fafc; border-radius: 16px;">
                <img src="logo.png" alt="FindMyNyumba"
                     style="height:60px; width:auto; display:block; object-fit:contain;"
                     onerror="this.style.display='none'; document.getElementById('logo-text').classList.remove('hidden')">
                <span id="logo-text" class="hidden text-2xl font-black text-[#ea580c]">FindMyNyumba</span>
            </a>
            <h1 class="text-2xl sm:text-3xl md:text-4xl font-black text-slate-900">Student Registration</h1>
            <div class="mt-3 text-slate-500 flex flex-col items-center space-y-1.5 text-sm font-medium">
                <span>Own an entire property? <a href="register-landlord.html" class="text-slate-800 font-bold hover:underline border-b-2 border-slate-800">Register as a Landlord</a></span>
            </div>
        </div>

        <div class="w-full max-w-md bg-white rounded-2xl shadow-sm border border-slate-200 p-6 md:p-8 mb-10">

            <div id="error-message" class="hidden mb-4 p-4 bg-red-50 text-red-600 text-sm font-semibold rounded-xl border border-red-100 flex items-start gap-2">
                <i class="fas fa-exclamation-circle flex-shrink-0 mt-0.5"></i>
                <span id="error-text"></span>
            </div>

            <div id="success-message" class="hidden mb-4 p-4 bg-green-50 text-green-700 text-sm font-semibold rounded-xl border border-green-200 flex items-center gap-2">
                <i class="fas fa-check-circle flex-shrink-0"></i>
                <span>Account created! Redirecting to login...</span>
            </div>

            <form id="registerForm" class="space-y-4" novalidate>

                <div>
                    <label class="block text-xs font-bold text-slate-500 uppercase tracking-wide mb-1.5">Full Name</label>
                    <input type="text" id="full_name" placeholder="Your full name" required
                        class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:outline-none focus:ring-2 focus:ring-[#ea580c] focus:border-transparent transition-all text-sm font-medium bg-slate-50 focus:bg-white">
                </div>

                <div>
                    <label class="block text-xs font-bold text-slate-500 uppercase tracking-wide mb-1.5">Student Email Address</label>
                    <input type="email" id="email" placeholder="student@university.edu.zm" required
                        class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:outline-none focus:ring-2 focus:ring-[#ea580c] focus:border-transparent transition-all text-sm font-medium bg-slate-50 focus:bg-white">
                </div>

                <div>
                    <label class="block text-xs font-bold text-slate-500 uppercase tracking-wide mb-1.5">Phone Number / WhatsApp</label>
                    <input type="tel" id="phone" placeholder="+260 9XX XXX XXX" required
                        class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:outline-none focus:ring-2 focus:ring-[#ea580c] focus:border-transparent transition-all text-sm font-medium bg-slate-50 focus:bg-white">
                </div>

                <div class="grid grid-cols-1 sm:grid-cols-2 gap-3">
                    <div>
                        <label class="block text-xs font-bold text-slate-500 uppercase tracking-wide mb-1.5">University</label>
                        <input type="text" id="university" placeholder="e.g. UNZA, CBU" required
                            class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:outline-none focus:ring-2 focus:ring-[#ea580c] focus:border-transparent transition-all text-sm font-medium bg-slate-50 focus:bg-white">
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-slate-500 uppercase tracking-wide mb-1.5">Student ID</label>
                        <input type="text" id="student_id" placeholder="e.g. 20234567" required
                            class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:outline-none focus:ring-2 focus:ring-[#ea580c] focus:border-transparent transition-all text-sm font-medium bg-slate-50 focus:bg-white">
                    </div>
                </div>

                <div>
                    <label class="block text-xs font-bold text-slate-500 uppercase tracking-wide mb-1.5">I am...</label>
                    <select id="role_select"
                        class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:outline-none focus:ring-2 focus:ring-[#ea580c] text-slate-700 bg-slate-50 focus:bg-white text-sm font-medium cursor-pointer">
                        <option value="student">Looking for a place (Student)</option>
                        <option value="student_host">Offering a bedspace (Student Host)</option>
                    </select>
                </div>

                <div>
                    <label class="block text-xs font-bold text-slate-500 uppercase tracking-wide mb-1.5">Password</label>
                    <div class="relative">
                        <input type="password" id="password" placeholder="Create a strong password" required
                            class="w-full px-4 py-3 pr-11 rounded-xl border border-slate-200 focus:outline-none focus:ring-2 focus:ring-[#ea580c] focus:border-transparent transition-all text-sm font-medium bg-slate-50 focus:bg-white">
                        <button type="button" onclick="togglePassword('password','eye1')" class="absolute right-3 top-1/2 -translate-y-1/2 text-slate-400 hover:text-slate-600">
                            <i id="eye1" class="fas fa-eye text-sm"></i>
                        </button>
                    </div>
                    <div class="mt-2 hidden" id="pwd-strength-container">
                        <div class="flex justify-between mb-1">
                            <span class="text-xs font-semibold text-slate-400">Password strength</span>
                            <span class="text-xs font-bold" id="pwd-strength-text">Weak</span>
                        </div>
                        <div class="w-full bg-slate-200 rounded-full h-1.5 flex gap-1">
                            <div class="h-1.5 w-1/3 rounded-full transition-all duration-300 bg-slate-200" id="pwd-bar-1"></div>
                            <div class="h-1.5 w-1/3 rounded-full transition-all duration-300 bg-slate-200" id="pwd-bar-2"></div>
                            <div class="h-1.5 w-1/3 rounded-full transition-all duration-300 bg-slate-200" id="pwd-bar-3"></div>
                        </div>
                        <p class="text-[10px] text-slate-400 mt-1">8-12 chars with uppercase, lowercase, number &amp; special character.</p>
                    </div>
                </div>

                <div>
                    <label class="block text-xs font-bold text-slate-500 uppercase tracking-wide mb-1.5">Confirm Password</label>
                    <div class="relative">
                        <input type="password" id="confirm_password" placeholder="Confirm your password" required
                            class="w-full px-4 py-3 pr-11 rounded-xl border border-slate-200 focus:outline-none focus:ring-2 focus:ring-[#ea580c] focus:border-transparent transition-all text-sm font-medium bg-slate-50 focus:bg-white">
                        <button type="button" onclick="togglePassword('confirm_password','eye2')" class="absolute right-3 top-1/2 -translate-y-1/2 text-slate-400 hover:text-slate-600">
                            <i id="eye2" class="fas fa-eye text-sm"></i>
                        </button>
                    </div>
                </div>

                <label class="flex items-start gap-3 text-sm text-slate-600 cursor-pointer">
                    <input type="checkbox" id="terms" required class="mt-0.5 rounded border-slate-300 text-[#ea580c] focus:ring-[#ea580c] flex-shrink-0">
                    <span class="font-medium">I agree to the <a href="terms.html" class="text-[#ea580c] hover:underline font-bold">Terms of Service</a> and <a href="privacy.html" class="text-[#ea580c] hover:underline font-bold">Privacy Policy</a></span>
                </label>

                <button type="submit" id="submitBtn"
                    class="w-full bg-[#ea580c] text-white font-black py-3.5 rounded-xl hover:bg-orange-700 transition-all duration-200 flex justify-center items-center gap-2 text-sm shadow-md shadow-orange-200 active:scale-[0.98]">
                    <span id="btn-text">Create Account</span>
                    <svg id="btn-spinner" class="hidden animate-spin h-4 w-4 text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                        <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                        <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                    </svg>
                </button>
            </form>
        </div>

        <p class="text-center text-xs text-slate-400 font-medium pb-8">
            Already have an account? <a href="login.html" class="text-[#ea580c] font-bold hover:underline">Sign in</a>
        </p>
    </div>

    <script>
        const API_BASE_URL = 'http://127.0.0.1:8000/api/v1';

        function togglePassword(fieldId, eyeId) {
            const field = document.getElementById(fieldId);
            const eye = document.getElementById(eyeId);
            if (field.type === 'password') {
                field.type = 'text';
                eye.className = 'fas fa-eye-slash text-sm';
            } else {
                field.type = 'password';
                eye.className = 'fas fa-eye text-sm';
            }
        }

        function showError(msg) {
            document.getElementById('error-text').innerText = msg;
            document.getElementById('error-message').classList.remove('hidden');
            document.getElementById('error-message').scrollIntoView({ behavior: 'smooth', block: 'nearest' });
        }
        function hideError() {
            document.getElementById('error-message').classList.add('hidden');
        }

        document.getElementById('password').addEventListener('input', (e) => {
            const val = e.target.value;
            const container = document.getElementById('pwd-strength-container');
            if (!val.length) { container.classList.add('hidden'); return; }
            container.classList.remove('hidden');

            let strength = 0;
            if (val.length >= 8 && val.length <= 12) strength++;
            if (/[A-Z]/.test(val) && /[a-z]/.test(val)) strength++;
            if (/[0-9]/.test(val) && /[^A-Za-z0-9]/.test(val)) strength++;

            const text = document.getElementById('pwd-strength-text');
            const bars = [document.getElementById('pwd-bar-1'), document.getElementById('pwd-bar-2'), document.getElementById('pwd-bar-3')];
            bars.forEach(b => { b.className = 'h-1.5 w-1/3 rounded-full transition-all duration-300 bg-slate-200'; });

            const levels = [
                { label: 'Weak',   cls: 'text-xs font-bold text-red-500',    color: 'bg-red-500',    count: 1 },
                { label: 'Medium', cls: 'text-xs font-bold text-yellow-500', color: 'bg-yellow-500', count: 2 },
                { label: 'Strong', cls: 'text-xs font-bold text-green-500',  color: 'bg-green-500',  count: 3 },
            ];

            if (strength > 0) {
                const lvl = levels[strength - 1];
                text.innerText = lvl.label;
                text.className = lvl.cls;
                for (let i = 0; i < lvl.count; i++) {
                    bars[i].className = `h-1.5 w-1/3 rounded-full transition-all duration-300 ${lvl.color}`;
                }
            }
        });

        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            hideError();

            const password = document.getElementById('password').value;
            const confirm  = document.getElementById('confirm_password').value;
            const terms    = document.getElementById('terms').checked;

            if (!terms) return showError('You must agree to the Terms and Conditions.');
            if (password !== confirm) return showError('Passwords do not match.');

            const pwdRegex = /^(?=.*[a-z])(?=.*[A-Z])(?=.*\d)(?=.*[^A-Za-z0-9]).{8,12}$/;
            if (!pwdRegex.test(password)) {
                return showError('Password must be 8-12 characters and include an uppercase letter, lowercase letter, number, and special character.');
            }

            const btn = document.getElementById('submitBtn');
            btn.disabled = true;
            document.getElementById('btn-text').innerText = 'Creating Account...';
            document.getElementById('btn-spinner').classList.remove('hidden');

            const payload = {
                full_name:    document.getElementById('full_name').value.trim(),
                email:        document.getElementById('email').value.trim(),
                phone_number: document.getElementById('phone').value.trim(),
                password:     password,
                role:         document.getElementById('role_select').value,
                university:   document.getElementById('university').value.trim(),
                student_id:   document.getElementById('student_id').value.trim()
            };

            try {
                const res = await fetch(`${API_BASE_URL}/auth/register`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                const data = await res.json();
                if (!res.ok) throw new Error(data.detail || 'Registration failed. Please try again.');

                document.getElementById('registerForm').classList.add('hidden');
                document.getElementById('success-message').classList.remove('hidden');
                setTimeout(() => window.location.href = 'login.html', 2000);

            } catch (err) {
                showError(err.message);
                btn.disabled = false;
                document.getElementById('btn-text').innerText = 'Create Account';
                document.getElementById('btn-spinner').classList.add('hidden');
            }
        });
    </script>
</body>
</html>
