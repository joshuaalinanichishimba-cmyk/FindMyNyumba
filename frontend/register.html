<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Registration - FindMyNyumba</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
</head>
<body class="bg-slate-50 flex flex-col items-center justify-center min-h-screen px-4 py-10">

    <div class="text-center mb-6 flex flex-col items-center">
        <a href="browse.html" class="mb-3 w-56 h-20 overflow-hidden flex justify-center items-center relative transition-transform duration-300 hover:scale-105">
            <img src="logo.png" alt="FindMyNyumba Logo"
                 class="absolute w-full h-full object-contain transform scale-[2.4] mix-blend-multiply brightness-[1.3] contrast-[1.5] saturate-125"
                 onerror="this.style.display='none'; document.getElementById('logo-text').classList.remove('hidden')">
        </a>
        <span id="logo-text" class="hidden text-2xl font-black text-[#ea580c] mb-2">FindMyNyumba</span>
        <h1 class="text-3xl md:text-4xl font-black text-slate-900">Student Registration</h1>
        <div class="mt-2 text-slate-500 flex flex-col items-center space-y-1 text-sm">
            <span>Already have an account? <a href="login.html" class="text-[#ea580c] font-bold hover:underline">Sign in here</a></span>
            <span>Own an entire property? <a href="register-landlord.html" class="text-slate-800 font-bold hover:underline border-b-2 border-slate-800">Register as a Landlord</a></span>
        </div>
    </div>

    <div class="w-full max-w-md bg-white rounded-2xl shadow-md border border-slate-200 p-6 md:p-8 mb-10">

        <div id="error-message" class="hidden mb-4 p-3 bg-red-50 text-red-600 text-sm font-semibold rounded-xl border border-red-100 flex items-start gap-2">
            <svg class="w-5 h-5 flex-shrink-0 mt-0.5" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M18 10a8 8 0 11-16 0 8 8 0 0116 0zm-7 4a1 1 0 11-2 0 1 1 0 012 0zm-1-9a1 1 0 00-1 1v4a1 1 0 102 0V6a1 1 0 00-1-1z" clip-rule="evenodd"></path></svg>
            <span id="error-text"></span>
        </div>

        <div id="success-message" class="hidden mb-4 p-3 bg-green-50 text-green-700 text-sm font-semibold rounded-xl border border-green-200 flex items-center gap-2">
            <svg class="w-5 h-5 flex-shrink-0" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zm3.707-9.293a1 1 0 00-1.414-1.414L9 10.586 7.707 9.293a1 1 0 00-1.414 1.414l2 2a1 1 0 001.414 0l4-4z" clip-rule="evenodd"></path></svg>
            <span>Account created! Redirecting to login...</span>
        </div>

        <form id="registerForm" class="space-y-4" novalidate>

            <input type="text" id="full_name" placeholder="Full Name" required
                class="w-full px-4 py-3 rounded-xl border border-slate-300 focus:outline-none focus:ring-2 focus:ring-[#ea580c] transition-shadow text-sm">

            <input type="email" id="email" placeholder="Student Email Address" required
                class="w-full px-4 py-3 rounded-xl border border-slate-300 focus:outline-none focus:ring-2 focus:ring-[#ea580c] transition-shadow text-sm">

            <input type="tel" id="phone" placeholder="Phone Number / WhatsApp" required
                class="w-full px-4 py-3 rounded-xl border border-slate-300 focus:outline-none focus:ring-2 focus:ring-[#ea580c] transition-shadow text-sm">

            <div class="flex flex-col sm:flex-row gap-3">
                <input type="text" id="university" placeholder="University (e.g., UNZA)" required
                    class="flex-1 px-4 py-3 rounded-xl border border-slate-300 focus:outline-none focus:ring-2 focus:ring-[#ea580c] transition-shadow text-sm">
                <input type="text" id="student_id" placeholder="Student ID" required
                    class="flex-1 px-4 py-3 rounded-xl border border-slate-300 focus:outline-none focus:ring-2 focus:ring-[#ea580c] transition-shadow text-sm">
            </div>

            <select id="role_select"
                class="w-full px-4 py-3 rounded-xl border border-slate-300 focus:outline-none focus:ring-2 focus:ring-[#ea580c] text-slate-700 bg-white text-sm">
                <option value="student">I am looking for a place (Student)</option>
                <option value="student_host">I am offering a bedspace (Student Host)</option>
            </select>

            <div>
                <input type="password" id="password" placeholder="Password" required
                    class="w-full px-4 py-3 rounded-xl border border-slate-300 focus:outline-none focus:ring-2 focus:ring-[#ea580c] transition-shadow text-sm">

                <div class="mt-2 hidden" id="pwd-strength-container">
                    <div class="flex justify-between mb-1">
                        <span class="text-xs font-semibold text-slate-500">Password Strength</span>
                        <span class="text-xs font-bold" id="pwd-strength-text">Weak</span>
                    </div>
                    <div class="w-full bg-slate-200 rounded-full h-1.5 flex gap-1">
                        <div class="h-1.5 w-1/3 rounded-full transition-all duration-300 bg-slate-200" id="pwd-bar-1"></div>
                        <div class="h-1.5 w-1/3 rounded-full transition-all duration-300 bg-slate-200" id="pwd-bar-2"></div>
                        <div class="h-1.5 w-1/3 rounded-full transition-all duration-300 bg-slate-200" id="pwd-bar-3"></div>
                    </div>
                    <p class="text-[10px] text-slate-500 mt-1">Must be 8-12 chars with uppercase, lowercase, number &amp; special character.</p>
                </div>
            </div>

            <input type="password" id="confirm_password" placeholder="Confirm Password" required
                class="w-full px-4 py-3 rounded-xl border border-slate-300 focus:outline-none focus:ring-2 focus:ring-[#ea580c] transition-shadow text-sm">

            <label class="flex items-center text-sm text-slate-600 cursor-pointer gap-2">
                <input type="checkbox" id="terms" required class="rounded border-slate-300 text-[#ea580c] focus:ring-[#ea580c]">
                I agree to the <a href="#" class="text-[#ea580c] hover:underline ml-0.5">Terms and Conditions</a>
            </label>

            <button type="submit" id="submitBtn"
                class="w-full bg-[#ea580c] text-white font-bold py-3 rounded-xl hover:bg-orange-700 transition duration-200 flex justify-center items-center gap-2 text-sm">
                <span id="btn-text">Create Account</span>
                <svg id="btn-spinner" class="hidden animate-spin h-4 w-4 text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                    <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                    <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                </svg>
            </button>
        </form>
    </div>

    <script>
        const API_BASE_URL = 'https://findmynyumba.onrender.com/api/v1';

        function showError(msg) {
            document.getElementById('error-text').innerText = msg;
            document.getElementById('error-message').classList.remove('hidden');
        }
        function hideError() {
            document.getElementById('error-message').classList.add('hidden');
        }

        // Password strength meter
        document.getElementById('password').addEventListener('input', (e) => {
            const val = e.target.value;
            const container = document.getElementById('pwd-strength-container');
            if (!val.length) { container.classList.add('hidden'); return; }
            container.classList.remove('hidden');

            let strength = 0;
            if (val.length >= 8 && val.length <= 12) strength++;
            if (/[A-Z]/.test(val) && /[a-z]/.test(val)) strength++;
            if (/[0-9]/.test(val) && /[^A-Za-z0-9]/.test(val)) strength++;

            const text = document.getElementById('pwd-strength-text');
            const bars = [
                document.getElementById('pwd-bar-1'),
                document.getElementById('pwd-bar-2'),
                document.getElementById('pwd-bar-3')
            ];

            bars.forEach(b => { b.className = 'h-1.5 w-1/3 rounded-full transition-all duration-300 bg-slate-200'; });

            const levels = [
                { label: 'Weak',   cls: 'text-xs font-bold text-red-500',    color: 'bg-red-500',    count: 1 },
                { label: 'Medium', cls: 'text-xs font-bold text-yellow-500', color: 'bg-yellow-500', count: 2 },
                { label: 'Strong', cls: 'text-xs font-bold text-green-500',  color: 'bg-green-500',  count: 3 },
            ];

            if (strength > 0) {
                const lvl = levels[strength - 1];
                text.innerText = lvl.label;
                text.className = lvl.cls;
                for (let i = 0; i < lvl.count; i++) {
                    bars[i].className = `h-1.5 w-1/3 rounded-full transition-all duration-300 ${lvl.color}`;
                }
            }
        });

        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            hideError();

            const password = document.getElementById('password').value;
            const confirm  = document.getElementById('confirm_password').value;
            const terms    = document.getElementById('terms').checked;

            if (!terms) return showError('You must agree to the Terms and Conditions.');
            if (password !== confirm) return showError('Passwords do not match.');

            const pwdRegex = /^(?=.*[a-z])(?=.*[A-Z])(?=.*\d)(?=.*[^A-Za-z0-9]).{8,12}$/;
            if (!pwdRegex.test(password)) {
                return showError('Password must be 8-12 characters and include an uppercase letter, lowercase letter, number, and special character.');
            }

            const btn = document.getElementById('submitBtn');
            btn.disabled = true;
            document.getElementById('btn-text').innerText = 'Creating Account...';
            document.getElementById('btn-spinner').classList.remove('hidden');

            // Payload matches backend auth/register expected fields
            const payload = {
                full_name:    document.getElementById('full_name').value.trim(),
                email:        document.getElementById('email').value.trim(),
                phone_number: document.getElementById('phone').value.trim(),
                password:     password,
                role:         document.getElementById('role_select').value,
                university:   document.getElementById('university').value.trim(),
                student_id:   document.getElementById('student_id').value.trim()
            };

            try {
                const res = await fetch(`${API_BASE_URL}/auth/register`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                const data = await res.json();
                if (!res.ok) throw new Error(data.detail || 'Registration failed. Please try again.');

                document.getElementById('registerForm').classList.add('hidden');
                document.getElementById('success-message').classList.remove('hidden');
                setTimeout(() => window.location.href = 'login.html', 2000);

            } catch (err) {
                showError(err.message);
                btn.disabled = false;
                document.getElementById('btn-text').innerText = 'Create Account';
                document.getElementById('btn-spinner').classList.add('hidden');
            }
        });
    </script>
</body>
</html>
