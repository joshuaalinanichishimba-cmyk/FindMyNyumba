<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FindMyNyumba - Property Details</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>#map { height: 350px; border-radius: 1.5rem; z-index: 1; border: 1px solid #e5e7eb; }</style>
</head>
<body class="bg-gray-50">
    <nav class="bg-white shadow-sm sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 py-4 flex justify-between items-center">
            <a href="browse.html" class="flex items-center gap-2"><img src="logo.png" alt="Logo" class="h-10 w-auto object-contain" onerror="this.style.display='none'"><span class="text-2xl font-black text-[#ea580c]">FindMy<span class="text-blue-900">Nyumba</span></span></a>
            <div class="space-x-6 font-bold text-gray-600">
                <a href="browse.html" class="hover:text-[#ea580c]">Browse</a>
                <a href="dashboard-student.html" class="hover:text-[#ea580c]">Dashboard</a>
            </div>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto px-4 py-8">
        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
            <div class="lg:col-span-2 space-y-6">
                <div class="relative bg-gray-200 aspect-video rounded-3xl overflow-hidden shadow-inner flex items-center justify-center">
                    <img id="main-img" src="https://images.unsplash.com/photo-1522708323590-d24dbb6b0267?auto=format&fit=crop&w=1200" class="w-full h-full object-cover">
<button onclick="toggleSave()" id="save-btn" class="absolute top-6 right-6 bg-white/95 backdrop-blur-sm w-12 h-12 rounded-full shadow-md flex items-center justify-center hover:shadow-lg transition-all duration-300 z-10 transform hover:scale-110 group border border-gray-100" title="Save to Shortlist">
    <i id="save-icon" class="far fa-heart text-2xl text-gray-400 group-hover:text-red-500 transition-colors"></i>
</button>
                </div>
                
                <div class="bg-white p-8 rounded-3xl shadow-sm border border-gray-100">
                    <h1 id="prop-title" class="text-4xl font-black text-gray-900 mb-2">Loading Property...</h1>
                    <p id="prop-location" class="text-gray-500 font-medium flex items-center mb-6">
                        <i class="fas fa-map-marker-alt mr-2 text-[#ea580c]"></i> --
                    </p>
                    <div class="grid grid-cols-2 md:grid-cols-4 gap-4 py-6 border-y border-gray-100 mb-6 font-bold">
                        <div class="text-center"><p class="text-xs text-gray-400 uppercase">Type</p><p id="prop-type">--</p></div>
                        <div class="text-center"><p class="text-xs text-gray-400 uppercase">Gender</p><p id="prop-gender">Mixed</p></div>
                        <div class="text-center"><p class="text-xs text-gray-400 uppercase">Status</p><p class="text-green-600">Verified</p></div>
                        <div class="text-center"><p class="text-xs text-gray-400 uppercase">Distance</p><p>~850m</p></div>
                    </div>
                    <h2 class="text-xl font-black mb-4">About this Nyumba</h2>
                    <p id="prop-description" class="text-gray-600 leading-relaxed italic">No description available.</p>
                </div>

                <div class="bg-white p-8 rounded-3xl shadow-sm border border-gray-100">
                    <div class="flex justify-between items-center mb-6">
                        <h2 class="text-2xl font-black">Student Reviews</h2>
                        <button onclick="document.getElementById('review-form-container').classList.toggle('hidden')" class="bg-gray-900 text-white px-4 py-2 rounded-xl text-sm font-bold">Write a Review</button>
                    </div>

                    <div id="review-form-container" class="hidden mt-6 p-6 bg-gray-50 rounded-2xl border border-gray-100 shadow-inner mb-8">
                        <h3 class="font-black text-gray-900 mb-4">Submit Your Review</h3>
                        <div class="flex gap-2 text-2xl text-yellow-400 mb-4" id="star-input">
                            <i class="fas fa-star cursor-pointer" onclick="setRating(1)"></i>
                            <i class="fas fa-star cursor-pointer" onclick="setRating(2)"></i>
                            <i class="fas fa-star cursor-pointer" onclick="setRating(3)"></i>
                            <i class="fas fa-star cursor-pointer" onclick="setRating(4)"></i>
                            <i class="fas fa-star cursor-pointer" onclick="setRating(5)"></i>
                        </div>
                        <input type="hidden" id="rev-rating-val" value="5">
                        <input type="text" id="rev-name" placeholder="Your Name" class="w-full p-3 mb-3 rounded-xl border border-gray-200 outline-none">
                        <textarea id="rev-comment" placeholder="How was your stay?" class="w-full p-3 mb-3 rounded-xl border border-gray-200 outline-none" rows="3"></textarea>
                        <button onclick="handleReviewSubmit()" class="w-full md:w-auto bg-[#ea580c] text-white px-8 py-3 rounded-xl font-black hover:bg-orange-600 transition-all">Post Review</button>
                    </div>

                    <div id="reviews-container" class="space-y-4">
                        <p class="text-gray-400 italic">Loading reviews...</p>
                    </div>
                </div>
            </div>

            <div class="space-y-6">
                <div class="bg-white p-8 rounded-3xl shadow-sm border border-gray-100 sticky top-28">
                    <div class="mb-6">
                        <p class="text-xs font-black text-gray-400 uppercase">Monthly Price</p>
                        <div class="flex items-baseline">
                            <span class="text-4xl font-black text-[#ea580c]">ZMW</span>
                            <span id="prop-price" class="text-4xl font-black text-[#ea580c] ml-2">--</span>
                        </div>
                                        </div>
                    
                    <div class="flex items-center gap-4 mb-6 p-4 bg-orange-50/50 rounded-2xl border border-orange-100/50">
                        <img src="https://ui-avatars.com/api/?name=Verified+Host&background=ea580c&color=fff&rounded=true&bold=true" alt="Landlord Avatar" class="w-12 h-12 rounded-full shadow-sm ring-2 ring-white">
                        <div>
                            <p class="font-black text-gray-900 text-sm flex items-center">
                                Verified Host <i class="fas fa-check-circle text-blue-500 ml-1.5 text-xs" title="Identity Verified"></i>
                            </p>
                            <p class="text-xs text-gray-500 mt-1 font-bold">
                                <i class="fas fa-bolt text-yellow-500 mr-1"></i> Responds in ~1 hr
                            </p>
                        </div>
                    </div>
                    
                    <button id="msg-landlord-btn" class="w-full bg-[#ea580c] text-white py-4 rounded-2xl font-black text-lg shadow-lg hover:bg-orange-600 transition-all mb-6">
                        <i class="fas fa-paper-plane mr-2"></i> Message Landlord
                    </button>
                    <div id="map"></div>
                </div>
            </div>
        </div>
    </main>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        let listingMap = null;
        let currentRatingValue = 5;

                function toggleSave() {
            const propId = new URLSearchParams(window.location.search).get('id');
            if (!propId) return;
            
            let saved = JSON.parse(localStorage.getItem('saved_nyumbas') || '[]');
            const icon = document.getElementById('save-icon');
            
            if (saved.includes(propId)) {
                // Remove from saved
                saved = saved.filter(id => id !== propId);
                icon.className = 'far fa-heart text-2xl text-gray-400 group-hover:text-red-500 transition-colors';
            } else {
                // Add to saved
                saved.push(propId);
                icon.className = 'fas fa-heart text-2xl text-red-500 transition-colors transform scale-110';
            }
            
            localStorage.setItem('saved_nyumbas', JSON.stringify(saved));
        }

        async function initPage() {
            const urlParams = new URLSearchParams(window.location.search);
            const propId = urlParams.get('id');
            if (!propId) return;

            try {
                // 1. Fetch Backend Data
                const [pRes, rRes] = await Promise.all([
                    fetch(`http://127.0.0.1:8000/api/v1/landlord/properties/${propId}`),
                    Promise.resolve(new Response(JSON.stringify([])))
                ]);

                const p = await pRes.json();
                const reviews = await rRes.json();

                // 2. Populate UI
                document.getElementById('prop-title').innerText = p.title || "Premium Student Room";
                document.getElementById('prop-price').innerText = parseFloat(p.price || 0).toLocaleString();
                document.getElementById('prop-location').innerText = p.location || "Lusaka, Zambia";
                document.getElementById('prop-description').innerText = p.description || "Beautiful verified student accommodation close to campus. Highly secure with great amenities. Contact the landlord for viewing arrangements.";
                document.getElementById('prop-type').innerText = p.title ? p.title.split(' ')[0] : "Room";
                
                // 2.5 Inject the actual database image!
                const mainImg = document.getElementById('main-img');
                if (mainImg) {
                    mainImg.src = p.image_url || "https://images.unsplash.com/photo-1522708323590-d24dbb6b0267?auto=format&fit=crop&w=1200";
                    mainImg.alt = p.title || "Property Image";
                }

                // 3. Render Reviews
                const revCont = document.getElementById('reviews-container');
                revCont.innerHTML = reviews.length > 0 
                    ? reviews.map(r => `<div class="p-4 bg-gray-50 rounded-2xl"><p class="font-bold text-gray-900">${r.student_name}</p><p class="text-gray-600 text-sm">${r.comment}</p></div>`).join('')
                    : '<p class="text-gray-400 italic">No reviews yet. Be the first!</p>';

                // 4. Map Logic
                if (!listingMap) {
                    listingMap = L.map('map').setView([-15.3875, 28.3228], 15);
                    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(listingMap);
                    L.marker([-15.3875, 28.3228]).addTo(listingMap).bindPopup(p.title);
                }

                // 5. Message Landlord Logic
                document.getElementById('msg-landlord-btn').onclick = () => {
                    window.location.href = `contact-landlord.html?id=${propId}`;
                };

            } catch (err) {
                console.error("Failed to load page:", err);
            }
        }

        function setRating(v) {
            currentRatingValue = v;
            document.getElementById('rev-rating-val').value = v;
            const stars = document.querySelectorAll('#star-input i');
            stars.forEach((s, i) => {
                s.style.color = (i < v) ? '#facc15' : '#d1d5db';
            });
        }

        async function handleReviewSubmit() {
            const urlParams = new URLSearchParams(window.location.search);
            const propId = urlParams.get('id');
            const name = document.getElementById('rev-name').value;
            const comment = document.getElementById('rev-comment').value;
            const rating = document.getElementById('rev-rating-val').value;
            
            if(!name || !comment) return alert("Please fill in all fields!");

            try {
                const res = await fetch(`http://127.0.0.1:8000/api/v1/reviews`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ property_id: parseInt(propId), student_name: name, rating: parseInt(rating), comment: comment })
                });
                if (res.ok) { alert("Review posted!"); location.reload(); }
            } catch (err) { console.error("Review failed:", err); }
        }

        document.addEventListener('DOMContentLoaded', initPage);
    </script>
    <script>
        // This function extends your existing property fetch logic
        function populateSharedDetails(p) {
            const container = document.getElementById('shared-housing-info');
            const sharedTypes = ['shared_room', 'bedspace', 'squatting_space'];
            
            // Only show the card if it's a shared housing type
            if (sharedTypes.includes(p.property_type?.toLowerCase()) || p.rent_split_amount > 0) {
                container.classList.remove('hidden');
                
                document.getElementById('display-gender').textContent = p.gender_preference || "Unisex";
                document.getElementById('display-occupancy').textContent = `${p.number_of_current_occupants || 0} / ${p.total_capacity || 0} Students`;
                document.getElementById('display-split').textContent = `ZMW ${p.rent_split_amount || 0}/mo`;
                
                if (p.quiet_study_environment) document.getElementById('badge-study').classList.remove('hidden');
                if (p.furnished) document.getElementById('badge-furnished').classList.remove('hidden');
            }
        }
    </script>
</body>
</html>
