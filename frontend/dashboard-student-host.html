<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Student Host Dashboard - FindMyNyumba</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .hidden-view { display: none !important; }
        .nav-active { background-color: #fff7ed; color: #ea580c; border-right: 4px solid #ea580c; }
        .badge-boosted { background: linear-gradient(45deg, #FFD700, #FFA500); color: #fff; text-shadow: 1px 1px 0px rgba(0,0,0,0.2); }
        .chat-bubble-me { background-color: #ea580c; color: white; border-bottom-right-radius: 0; }
        .chat-bubble-them { background-color: #f3f4f6; color: #1f2937; border-bottom-left-radius: 0; }
        #sidebar { transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
    </style>
    <link rel="icon" type="image/png" href="logo.png">
</head>
<body class="bg-gray-50 flex flex-col lg:flex-row h-screen overflow-hidden font-sans relative">

    <div class="lg:hidden bg-white border-b shadow-sm flex justify-between items-center p-4 z-50 shrink-0">
        <h1 class="text-xl font-black text-[#ea580c]">FindMy<span class="text-blue-900">Nyumba</span></h1>
        <button id="mobile-menu-btn" class="text-gray-600 focus:outline-none hover:text-[#ea580c] p-2">
            <i class="fas fa-bars text-2xl"></i>
        </button>
    </div>

    <div id="mobile-overlay" class="fixed inset-0 bg-black/60 z-40 hidden lg:hidden backdrop-blur-sm"></div>

    <aside id="sidebar" class="fixed lg:relative w-72 bg-white border-r shadow-2xl lg:shadow-none flex flex-col h-full z-50 transform -translate-x-full lg:translate-x-0 shrink-0 left-0 top-0">
        <div class="p-6 border-b text-center relative">
            <h1 class="text-2xl font-black text-[#ea580c]">FindMy<span class="text-blue-900">Nyumba</span></h1>
            <div class="mt-2 inline-block px-3 py-1 bg-gray-100 rounded-full">
                <p id="role-badge" class="text-[10px] font-bold text-[#ea580c] uppercase tracking-wider">STUDENT HOST</p>
            </div>
            <button id="mobile-close-btn" class="lg:hidden absolute top-4 right-4 text-gray-400 hover:text-gray-600 p-2">
                <i class="fas fa-times text-xl"></i>
            </button>
        </div>
        <nav class="flex-1 p-4 space-y-1 overflow-y-auto">
            <button onclick="switchTab('overview')" id="nav-overview" class="nav-btn nav-active w-full text-left p-3 rounded-md text-sm font-bold flex items-center"><i class="fas fa-chart-pie w-6"></i> Overview</button>
            <button onclick="switchTab('listings')" id="nav-listings" class="nav-btn w-full text-left p-3 rounded-md text-sm font-bold flex items-center hover:bg-orange-50"><i class="fas fa-building w-6"></i> My Listings</button>
            <button onclick="switchTab('upload')" id="nav-upload" class="nav-btn w-full text-left p-3 rounded-md text-sm font-bold flex items-center hover:bg-orange-50"><i class="fas fa-plus-circle w-6"></i> Add Listing</button>
            <button onclick="switchTab('inquiries')" id="nav-inquiries" class="nav-btn w-full text-left p-3 rounded-md text-sm font-bold flex items-center hover:bg-orange-50">
                <i class="fas fa-envelope w-6"></i> Inquiries 
                <span id="unread-badge" class="ml-auto bg-red-500 text-white text-[10px] font-black px-2 py-0.5 rounded-full hidden">0</span>
            </button>
            <button onclick="switchTab('verification')" id="nav-verification" class="nav-btn w-full text-left p-3 rounded-md text-sm font-bold flex items-center hover:bg-orange-50"><i class="fas fa-shield-alt w-6"></i> Verification</button>
            <button onclick="switchTab('payments')" id="nav-payments" class="nav-btn w-full text-left p-3 rounded-md text-sm font-bold flex items-center hover:bg-orange-50"><i class="fas fa-wallet w-6"></i> Monetization & Boosts</button>
            <button onclick="switchTab('profile')" id="nav-profile" class="nav-btn w-full text-left p-3 rounded-md text-sm font-bold flex items-center hover:bg-orange-50"><i class="fas fa-user-cog w-6"></i> Profile & Settings</button>
        </nav>
        <div class="p-4 border-t">
            <button onclick="logout()" class="w-full text-left p-3 text-red-600 font-bold hover:bg-red-50 rounded flex items-center"><i class="fas fa-sign-out-alt w-6"></i> Logout</button>
        </div>
    </aside>

    <main class="flex-1 overflow-y-auto p-4 lg:p-10 bg-gray-50 relative z-0">
        
        <div id="view-overview" class="dashboard-view">
            <h2 class="text-2xl lg:text-4xl font-black mb-8 text-gray-800">Dashboard Overview</h2>
            <div id="verification-alert" class="hidden mb-8 bg-amber-50 border-l-4 border-amber-500 p-5 rounded-xl shadow-sm">
                <div class="flex flex-col sm:flex-row sm:items-center gap-4">
                    <div class="flex items-center gap-3">
                        <i class="fas fa-exclamation-circle text-amber-500 text-2xl"></i>
                        <h3 class="font-bold text-amber-900">Account Verification Required</h3>
                    </div>
                    <button onclick="switchTab('verification')" class="sm:ml-auto bg-amber-600 text-white px-6 py-2 rounded-lg font-black text-sm hover:bg-amber-700 transition shadow-md">Verify Now</button>
                </div>
            </div>
            <div class="grid grid-cols-1 sm:grid-cols-2 xl:grid-cols-4 gap-6 mb-10">
                <div class="bg-white p-6 rounded-2xl shadow-sm border border-gray-100 border-t-4 border-[#ea580c]"><h3 class="text-gray-400 text-xs font-black uppercase">Active</h3><div id="stat-active" class="text-4xl font-black mt-2">0</div></div>
                <div class="bg-white p-6 rounded-2xl shadow-sm border border-gray-100 border-t-4 border-blue-600"><h3 class="text-gray-400 text-xs font-black uppercase">Pending</h3><div id="stat-pending" class="text-4xl font-black mt-2">0</div></div>
                <div class="bg-white p-6 rounded-2xl shadow-sm border border-gray-100 border-t-4 border-emerald-500"><h3 class="text-gray-400 text-xs font-black uppercase">Views</h3><div id="stat-views" class="text-4xl font-black mt-2 text-emerald-600">0</div></div>
                <div class="bg-white p-6 rounded-2xl shadow-sm border border-gray-100 border-t-4 border-purple-500"><h3 class="text-gray-400 text-xs font-black uppercase">Inquiries</h3><div id="stat-inquiries" class="text-4xl font-black mt-2 text-purple-600">0</div></div>
            </div>
        </div>
        </main>

    <script>
        'use strict';
        // (All existing JS logic preserved)
        const API_BASE = "https://findmynyumba.onrender.com/api/v1";
        let _currentUser = null;
        let _activeTab = 'overview';

        function getToken() { return localStorage.getItem('token') || sessionStorage.getItem('token'); }
        function authHeaders() { return { 'Authorization': 'Bearer ' + getToken(), 'Content-Type': 'application/json' }; }

        function switchTab(tabId) {
            _activeTab = tabId;
            document.querySelectorAll('.dashboard-view').forEach(v => v.classList.add('hidden-view'));
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('nav-active'));
            document.getElementById('view-' + tabId)?.classList.remove('hidden-view');
            document.getElementById('nav-' + tabId)?.classList.add('nav-active');
        }

        document.addEventListener('DOMContentLoaded', () => {
            const sidebar = document.getElementById('sidebar');
            const overlay = document.getElementById('mobile-overlay');
            const openBtn = document.getElementById('mobile-menu-btn');
            const closeBtn = document.getElementById('mobile-close-btn');

            function toggleSidebar() {
                sidebar.classList.toggle('-translate-x-full');
                overlay.classList.toggle('hidden');
                document.body.classList.toggle('overflow-hidden');
            }

            openBtn?.addEventListener('click', toggleSidebar);
            closeBtn?.addEventListener('click', toggleSidebar);
            overlay?.addEventListener('click', toggleSidebar);

            // Auto-close sidebar on mobile after clicking a link
            document.querySelectorAll('.nav-btn').forEach(btn => {
                btn.addEventListener('click', () => {
                    if (window.innerWidth < 1024) toggleSidebar();
                });
            });
        });

        async function init() {
            if (!getToken()) window.location.replace('login.html');
            switchTab('overview');
        }
        init();
    </script>
</body>
</html>
