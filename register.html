<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Student Registration - FindMyNyumba</title>
    <script src="https://cdn.tailwindcss.com"></script>
<script src="https://accounts.google.com/gsi/client" async defer></script>
</head>
<body class="bg-slate-50 flex flex-col items-center justify-center min-h-screen py-10">
    <div class="text-center mb-6 flex flex-col items-center">
        <a href="browse.html" class="mb-2 w-64 md:w-80 h-20 md:h-24 overflow-hidden flex justify-center items-center relative transition-transform duration-300 hover:scale-105">
            <img src="logo.png" alt="FindMyNyumba Logo" class="absolute w-full h-full object-contain transform scale-[2.4] md:scale-[2.8] mix-blend-multiply brightness-[1.3] contrast-[1.5] saturate-125" onerror="this.style.display='none'">
        </a>
        <h1 class="text-4xl font-black text-slate-900">Student Registration</h1>
        <div class="mt-2 text-slate-500 flex flex-col items-center space-y-1">
            <span>Already have an account? <a href="login.html" class="text-[#ea580c] font-bold hover:underline">Sign in here</a></span>
            <span>Own an entire property? <a href="register-landlord.html" class="text-slate-800 font-bold hover:underline border-b-2 border-slate-800">Register as a Landlord</a></span>
        </div>
    </div>

    <div class="w-full max-w-md bg-white rounded-xl shadow-md border border-slate-200 p-8 mb-10">
        <div class="space-y-4">
            <div><input type="text" id="full_name" placeholder="Full Name" required class="w-full px-4 py-3 rounded-lg border border-slate-300 focus:outline-none focus:ring-2 focus:ring-[#ea580c]"></div>
            <div><input type="email" id="email" placeholder="Student Email Address" required class="w-full px-4 py-3 rounded-lg border border-slate-300 focus:outline-none focus:ring-2 focus:ring-[#ea580c]"></div>
            <div><input type="text" id="phone" placeholder="Phone Number / WhatsApp" required class="w-full px-4 py-3 rounded-lg border border-slate-300 focus:outline-none focus:ring-2 focus:ring-[#ea580c]"></div>
            
            <div class="flex space-x-2">
                <input type="text" id="university" placeholder="University (e.g., UNZA)" required class="w-1/2 px-4 py-3 rounded-lg border border-slate-300 focus:outline-none focus:ring-2 focus:ring-[#ea580c]">
                <input type="text" id="student_id" placeholder="Student ID" required class="w-1/2 px-4 py-3 rounded-lg border border-slate-300 focus:outline-none focus:ring-2 focus:ring-[#ea580c]">
            </div>

            <div>
                <select id="role_select" class="w-full px-4 py-3 rounded-lg border border-slate-300 focus:outline-none focus:ring-2 focus:ring-[#ea580c] text-slate-700 bg-white">
                    <option value="student">I am looking for a place (Student)</option>
                    <option value="student_host">I am looking for a roommate (Student Host)</option>
                </select>
            </div>

            <div><input type="password" id="password" placeholder="Password" required class="w-full px-4 py-3 rounded-lg border border-slate-300 focus:outline-none focus:ring-2 focus:ring-[#ea580c]"></div>
            <div><input type='password' id='confirm_password' placeholder='Confirm Password' required class='w-full px-4 py-3 rounded-lg border border-slate-300 focus:outline-none focus:ring-2 focus:ring-[#ea580c]'></div>
            <button type="button" id="submitBtn" class="w-full bg-[#ea580c] text-white font-bold py-3 rounded-lg hover:bg-orange-600 transition duration-200">Create Account</button>
        </div>
    </div>

    <script>
        document.getElementById('submitBtn').addEventListener('click', async (e) => {
            const btn = e.target;
            btn.disabled = true; btn.innerText = 'Registering...';

            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirm_password').value;

            if (password !== confirmPassword) {
                alert('❌ Passwords do not match! Please try again.');
                btn.disabled = false;
                btn.innerText = 'Create Account';
                return;
            }

            const payload = {
                full_name: document.getElementById('full_name').value.trim(),
                email: document.getElementById('email').value.trim(),
                phone_number: document.getElementById('phone').value.trim(),
                password: document.getElementById('password').value,
                role: document.getElementById('role_select').value,
                university: document.getElementById('university').value.trim(),
                student_id: document.getElementById('student_id').value.trim()
            };

            try {
                const res = await fetch('http://127.0.0.1:8000/api/v1/auth/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                
                const data = await res.json();
                if (!res.ok) throw new Error(data.detail || 'Registration failed.');

                alert('✅ Account created! Please sign in to continue.');
                window.location.href = 'login.html';
            } catch (err) {
                alert('❌ Error: ' + err.message);
                btn.disabled = false; btn.innerText = 'Create Account';
            }
        });
    </script>
</body>
</html>
