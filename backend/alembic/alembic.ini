# alembic.ini — FindMyNyumba
# DATABASE_URL is injected by env.py from .env — do NOT put real credentials here.

[alembic]
script_location = %(here)s/alembic
prepend_sys_path = .
path_separator = os

# sqlalchemy.url is intentionally left as a placeholder.
# env.py overrides it with settings.DATABASE_URL read from .env
sqlalchemy.url = placeholder

[post_write_hooks]

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
