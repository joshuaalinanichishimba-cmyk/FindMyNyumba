version: '3.8'

services:
  db:
    image: postgres:15-alpine
    volumes:
      - postgres_data:/var/lib/postgresql/data/
    environment:
      - POSTGRES_USER=nyumba_user
      - POSTGRES_PASSWORD=nyumba_pass
      - POSTGRES_DB=findmynyumba_db
    ports:
      - "5432:5432"

  web:
    build: .
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload
    volumes:
      - .:/code
      - ./uploads:/code/uploads
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://nyumba_user:nyumba_pass@db:5432/findmynyumba_db
      - SECRET_KEY=change_this_to_a_real_secret_in_prod
    depends_on:
      - db

volumes:
  postgres_data:
